 chh.5.desc:0 "Китайцы, видя постоянно растущую поддержку демократии в нашей стране, приглашают нас присоединиться к альянсу. Цель альянса - объединить республики для контроля над торговлей в регионе."
 chh.5.a:0 "Мы согласны."
 chh.5.b:0 "Нет!"
 
