 chh.7.desc:0 "Китайцы, видя постоянно растущую поддержку демократии в нашей стране, приглашают нас присоединиться к альянсу. Цель альянса - объединить республики для контроля над торговлей в регионе."
 chh.7.a:0 "Мы согласны."
 chh.7.b:0 "Нет!"
 
 chh.8.t:0 "§WПриглашение в альянс!"
 chh.8.desc:0 "Китайцы, видя постоянно растущую поддержку демократии в нашей стране, приглашают нас присоединиться к альянсу. Цель альянса - объединить республики для контроля над торговлей в регионе."
 chh.8.a:0 "Мы согласны."
 chh.8.b:0 "Нет!"
 
 lif.15.t:0 "§WНовый род войск!"
 lif.15.desc:0 "Некоторое время назад вы приказали своему королевскому кузнецу разработать новый тип оружия или усовершенствовать старое. В ходе испытаний выяснилось, что если сделать поверхность доспехов всадника более гладкой и ровной, двигаясь навстречу ветру, он будет тратить меньше энергии. Также оружейники решили прикрепить к доспехам большие крылья из перьев. Результат превзошел все ожидания! Крылья отпугивают лошадей противника своим звуком и размерами. Эти разработки определенно можно использовать. В народе этот новый тип кавалерии называют крылатыми гусарами."
 lif.15.a:0 "Сейчас прибудут крылатые гусары!"
 
 arr.2.t:0 "§WВосстание класса"
 arr.2.desc:0 "Один из классов в вашей стране настолько недоволен вашим правлением, что готов действовать. Слишком поздно что-либо менять, пора браться за оружие..."
 arr.2.a:0 "Черт возьми..."
 
 arr.3.t:0 "§WВосстание торговцев"
 arr.3.desc:0 "Милорд, торговцы настолько недовольны ситуацией в стране, что готовы действовать. Во многих городах люди, собирающие налоги, подверглись нападениям. Некоторые поселения отказываются подчиняться и объявили нам войну. Грядут кровавые времена..."
 arr.3.a:0 "Черт возьми..."
 
 pap.3.t:0 "§WТребование Папы Римского"
 pap.3.desc:0 "Папа Римский увеличивает сбор церковных налогов и требует от правителей денег, заработанных в храмах и костелищах же. Что мы будем делать? Сумма впечатляет, и многие считают, что папа римский позволяет себе слишком много..."
 pap.3.a:0 "Мы повинуемся..."
 pap.3.b:0 "Созвать Генеральные штаты!"
 
 pap.4.t:0 "§WИтоги встречи"
 pap.4.desc:0 "В результате созыва Генеральных штатов папа Бонифаций VIII был объявлен преступником и еретиком. Также все высказались против выплаты требуемой суммы."
 pap.4.a:0 "Отлично!"
 
 pap.5.t:0 "§WОтказался"
 pap.5.desc:0 "Французский король оказался не так глуп, как ожидалось, и созвал Генеральные штаты. В результате созыва Генеральных штатов вы были объявлены преступником и еретиком. Также все высказались против выплаты требуемых денег."
 pap.5.a:0 "Чертов Филип..."
 pap.6.a:0 "Отказывать!"
 
 pap.7.t:0 "§WПоддержка из Рима"
 pap.7.desc:0 "Папа римский лично приказал вам прислать деньги и оружие, чтобы поддержать ситуацию в ордене и продолжить Священный поход."
 pap.7.a:0 "Передавайте мои наилучшие пожелания."
 
 pap.8.t:0 "§WПередача права собственности"
 pap.8.desc:0 "Недавно Папа Римский издал буллу, в котором говорилось, что ордена тамплиеров распущены, а все имущество конфисковано. Через некоторое время Папа Римский издал новое буллу "Ad providam", в котором говорилось, что все бывшие владения тамплиеров передаются в ордена Святого Иоанна."
 pap.8.a:0 "Подарок судьбы!"

 pap.9.t:0 "§WНовый крестовый поход!"
 pap.9.desc:0 "Папа Римский объявил о новом крестовом походе, целью которого является возвращение Святой Земли и уничтожение еретиков. Вы, как лидер католического государства, должны решить, будете ли вы участвовать в Священной войне. Аве Мария!"
 pap.9.a:0 "Deus vult!"
 pap.9.b:0 "Мы не готовы."

 pap.10.t:0 "§WВозрождение язычества!"
 pap.10.desc:0 "Большинство в вашем положении приняло уже древнее язычество, вернулось к истокам, и все это благодаря оставшимся священникам, которые обращают внимание на мир в своей вере. Теперь люди свободны от ига христианства! Народ требует, чтобы вы следовали их примеру!"
 pap.10.a:0 "Да будет так."

 pap.12.t:0 "§WРеформатское язычество!"
 pap.12.desc:0 "Бывший Папа Римский, обладая принятыми правилами и поддержкой, объявил о реформе язычества и воссоединении всех представителей религий Европы. Новая религия похожа на германское, славянское, финское и балтийское язычество, и люди охотно примут ее. Что мы будем делать?"
 pap.12.a:0 "Скажи, что это действительно Хорошая идея!"
 pap.12.b:0 "Мы не собьемся с истинного пути!"

 pap.13.t:0 "§ЦЕЛАЯ Лига!"
 pap.13.desc:0 "Правитель Рима, наш великий религиозный реформатор, приглашает вас вступить в альянс "Святой лиги" для борьбы с католицизмом. Ересь искоренится сама собой!"
 pap.13.a:0 "Мы присоединимся."
 pap.13.b:0 "Снижение."

 hrd.1.t:0 "§WRaid!"
 hrd.1.desc:0 "Проклятые кочевники, которые ограничивают нас, снова происходят набеги. Многие деревни были разграблены или сожжены, а люди, которые пытались стабилизироваться, были зверски убиты. Наши усилия потратили много времени и денег на восстановление."
 hrd.1.a:0 "Где моя армия?!"

 bol.1.t:0 "§WЭпидемия!"
 bol.1.desc:0 "В последнее время многие люди заболели страшной болезнью. Болезнь распространяется с беспрецедентной скоростью и угрожает жизни многих людей. Никто не знает, как началась эпидемия. Возможно, она пришла из другой страны, а возможно, зародилась в нашей стране."
 bol.1.a:0 "Черт возьми..."

 bol.6.t:0 "§WЭпидемия закончилась!"
 bol.6.desc:0 "Во время эпидемии погибло много людей. Некоторые населенные пункты даже полностью вымерли, но угроза спала, и мы наконец-то можем отдохнуть."
 bol.6.a:0 "Наши молитвы были услышаны!"
 
 oth.3.t:0 "§WВопрос независимости"
 oth.3.desc:0 "Долгое время Полоцк смотрел на Литву с опаской, но сегодня, неожиданно для всех, прозвучало предложение о создании единой нации. Это будет экономически выгодно, но мы потеряем независимость."
 oth.3.a:0 "Принять."
 oth.3.b:0 "Снижение."
 
 swe.1.t:0 "§WПоддержка Швеции"
 swe.1.desc:0 "Пришло письмо от короля Швеции. Монарх призывает оказать помощь в борьбе с Новгородом. Этот поход организован во имя Веры, поэтому мы должны помочь."
 swe.1.a:0 "Отправить оружие."
 swe.1.b:0 "Пусть этим займутся приказы."
 swe.1.c:0 "Деньгами поможем."
 swe.1.d:0 "Мы ничем не можем помочь."
 
 swe.2.t:0 "§WПоддержка Швеции"
 swe.2.desc:0 "Швеция предлагает забыть о старых обидах и объединиться против общего врага - Новгорода. Организованная кампания соседа требует поддержки."
 swe.2.a:0 "Присоединяйтесь".
 swe.2.b:0 "Ха-ха, им нужна помощь..."
 
 swe.3.t:0 "§WСеверная торговая лига"
 swe.3.desc:0 "Швеция приглашает нас вступить в Северную торговую лигу - профсоюз северных государств. Это будет выгодно как экономически, так и политически."
 swe.3.a:0 "Принять."
 swe.3.b:0 "Снижение."
 
 swe.4.t:0 "§WСеверная торговая лига"
 swe.4.desc:0 "Швеция приглашает нас вступить в Северную торговую лигу - профсоюз северных государств. Это будет выгодно как экономически, так и политически."
 swe.4.a:0 "Принять."
 swe.4.b:0 "Снижение."
 
 swe.5.t:0 "§WСеверная торговая лига"
 swe.5.desc:0 "Швеция приглашает нас вступить в Северную торговую лигу - профсоюз северных государств. Это будет выгодно как экономически, так и политически."
 swe.5.a:0 "Принять."
 swe.5.b:0 "Снижение."
 
 bav.1.t:0 "§WУльтиматум"
 bav.1.desc:0 "Бавария угрожает нам войной и предлагает стать вассалом без кровопролития. В противном случае они вторгнутся в наше "болото" (так называется наша земля)."
 bav.1.a:0 "Они правы."
 бав.1.б:0 "Да, это болото, но это НАШЕ болото!"
 
 bav.2.t:0 "§WОбъединение"
 bav.2.desc:0 "Баварию и США связывают династические браки на протяжении многих лет. Бавария предлагает объединиться в одну нацию. Это укрепит наши общие позиции в регионе."
 bav.2.a:0 "Мы станем еще ближе!"
 bav.2.b:0 "Независимость важнее."
 
 bav.3.t:0 "§WБорьба за власть"
 bav.3.desc:0 "После коронации Людвига IV началась борьба за власть. Часть знати поддерживает нового императора, в то время как другие считают, что австрийский монарх имеет больше прав на корону. Кого мы поддержим в этой борьбе?"
 bav.3.a:0 "Бавария!"
 bav.3.b:0 "Для Австрии!"
 bav.3.c:0 "Мы будем сохранять нейтралитет."
 
 bav.4.t:0 "§WВыборы императора"
 bav.4.desc:0 "Пришло время выбрать нового императора Священной Римской империи. Вы, как курфюрст, имеете право проголосовать за любого монарха. Ваш выбор?"
 bav.4.a:0 "Бавария."
 bav.4.b:0 "Австрия."
 bav.4.c:0 "Богемия."
 bav.4.d:0 "Люксембург."
 bav.4.e:0 "Савоя."
 
 бав.5.т:0 "§Да здравствует Людвиг!"
 bav.5.desc:0 "Ты был избран императором Священной Римской Империи. Долгих лет тебе царствования!"
 bav.5.a:0 "Вся власть в моих руках..."

 golod.1.t:0 "§WГолод"
 golod.1.desc:0 "В вашей стране продолжался голод, но никаких мер не принималось. Некоторые люди начинают заниматься каннибализмом, некоторые уходят из городов в леса, а некоторые доедают последние запасы. Голод был вызван неурожаем из-за продолжительных дождей, которые продолжаются и по сей день. Кто знает, на что пойдут люди ради пропитания..."
 golod.1.a:0 "Черт возьми."
 
 byz.1.t:0 "§WУльтиматум"
 byz.1.desc:0 "Проклятые Палеологи требуют наши земли. Они считают, что стали слишком сильны, и требуют возвращения древних византийских земель. К ним относятся следующие земли: Сивас, Малатья, Ван, Эрзурум, Алеппо и Дейр-эз-Зор. Вам решать, соглашаться или нет, но наш народ готов к войне."
 byz.1.a:0 "Мы согласны..."
 byz.1.b:0 "Мы будем защищать эти земли вечно, если понадобится!"
 
 byz.2.t:0 "§WОни согласны"
 byz.2.desc:0 "- отлично. Хулагуиды согласились отдать нам требуемые территории без ненужного кровопролития."
 byz.2.a:0 "Это здорово."
 
 by.3.t:0 "§Борьба с хулиганами!"
 byz.3.desc:0 "Черт возьми, хулагуиды просто посмеялись над нашим требованием и сказали, что готовы к войне."
 быз.3.а:0 "Мы преподадим им урок!"
 
 torg.1.t:0 "§WАукцион рабов!"
 torg.1.desc:0 "Из далеких земель прибыла большая экспедиция. Их в первую очередь интересуют ресурсы, особенно рабы. На этом можно неплохо заработать. Они хотят купить право на добычу ресурсов в одном регионе."
 torg.1.a:0 "Мы предоставим им права на добычу полезных ископаемых в Гвинее!"
 torg.2.a:0 "Мы передадим им права на использование ресурсов Нуакшота!"
 torg.3.a:0 "Мы предоставим им права на использование ресурсов Нуакшота!"
 torg.4.a:0 "Мы предоставим им права на использование ресурсов Mosi!"
 torg.1.b:0 "Вместо этого они могут построить торговый пост."
 torg.1.c:0 "Прогнать их прочь!"
 torg.2.b:0 "Вместо этого они могут построить торговый пост."
 torg.2.c:0 "Прогнать их прочь!"
 torg.3.b:0 "Вместо этого они могут построить торговый пост."
 torg.3.c:0 "Прогнать их прочь!"
 torg.4.b:0 "Вместо этого они могут построить торговый пост."
 torg.4.c:0 "Прогнать их прочь!"
 
 torg.5.t:0 "§WПираты"
 torg.5.desc:0 "Одна из появившихся пиратских совершила набег на нашу землю. Прибрежные города были разграблены, а гарнизоны разбиты..."
 torg.5.a:0 "Опять восстановление..."

 torg.7.t:0 "§WЧистый доход"
 torg.7.desc:0 "Деньги поступили от ваших торговых компаний. Ваш доход за месяц составил [?ROOT.torg_company_income] в монетах. Дальнейшие новости о ваших торговых компаниях также будут постепенно постепенно."
 torg.7.a:0 "Что у нас тут..."

 torgOtv.1.t:0 "§WГлобальная торговля"
 torgOtv.1.desc:0 "Наша экспедиция прибыла к побережью Африки и сразу же вступила в океан с участием жителей.
 torgOtv.2.t:0 "§WГлобальная торговля"
 torgOtv.2.desc:0 "Наша экспедиция прибыла в Африку и произошла с учетом правил для переговоров. Они отклонили наше предложение, но переговоры начали торговлю после переговоров."
 torgOtv.3.t:0 "§WГлобальная торговля"
 torgOtv.3.desc:0 "Наша экспедиция прибыла в Африку и произошла с применением правил для торговли. [FROM.GetName] они не хотели торговать с нами. Наша экспедиция провалилась..."
 torgOtv.4.t:0 "§WГлобальная торговля"
 torgOtv.4.desc:0 "Наша экспедиция прибыла к побережью Африки и сразу же вступила в океан с участием жителей.
 torgOtv.5.t:0 "§WГлобальная торговля"
 torgOtv.5.desc:0 "Наша экспедиция прибыла к побережью Африки и сразу же вступила в океан с участием жителей.
 torgOtv.6.t:0 "§WГлобальная торговля"
 torgOtv.6.desc:0 "Наша экспедиция прибыла в Африку и произошла с возможными правилами для обращения в торговле. [FROM.GetName] отклонил наше предложение, но согласился организовать пост-торговлю."
 torgOtv.7.t:0 "§WГлобальная торговля"
 torgOtv.7.desc:0 "Наша экспедиция прибыла к побережью Африки и сразу же прибыла в Европу с участием жителей. В конце концов, они проложили путь к переходным ресурсам в Моси, но нам пришлось столкнуться."
 torgOtv.8.t:0 "§WГлобальная торговля"
 torgOtv.8.desc:0 "Наша экспедиция прибыла в Африку и произошла с возможными правилами в отношении торговли. [FROM.GetName] отклонил наше предложение, но согласился организовать пост-торговлю."
 torgOtv.1.a:0 "Интересно."
 
 dea.1.t:0 "§WЭдвард умер..."
 dea.1.desc:0 "Участвуя в очередной битве с шотландцами, Эдуард был убит. Его сын, Эдуард II, взойдет на трон."
 dea.1.a:0 "Отец..."

 dea.2.t:0 "§WБитва шпор"
 dea.2.desc:0 "Милорд, грязные фламандцы взбунтовались и сократили администрацию. Погибло 4000 человек. Они собрали довольно большую армию и разбили нашу. Нам кампании отстаивают свою независимость..."
 dea.2.a:0 "Нам придется..."

 oth.6.t:0 "§WВторжение на Д'чар!"
 oth.6.desc:0 "На окраинах вашей страны ваш бывший вассал Бахадур-хан собирает огромную армию. Он собирается захватить власть в наших штатах, а также вторгнуться в правительство."
 oth.6.a:0 "Дела плохи..."

 oth.5.t:0 "§WПредложение Альянса!"
 oth.5.desc:0 "Литва предлагает нам союз. Вместе мы создадим сильный политический блок, который сможет противостоять нашим соседям."
 oth.5.a:0 "Мы согласны."
 oth.5.b:0 "Хах , нет."
 
 oth.8.t:0 "§WОбъединение!"
 oth.8.desc:0 "После того, как мы вместе с Литвой изгнали крестоносцев, угроза на Востоке исчезла. Однако на Западе и Юге все еще есть сильные страны. Исходя из этого, Литва решила, что для укрепления своих позиций мы должны объединиться в единое государство. Поскольку Литва - самая сильная из нас, она станет объединяющим фактором."
 oth.8.a:0 "Выгодное предложение."
 oth.8.b:0 "Поднимайся на смертельный бой!"
 
 arr.4.t:0 "§WЗлые люди!"
 arr.4.desc:0 "Прежняя стабильность не может быть восстановлена. За довольно короткое время законы стали действовать против людей, мастерские стали лакомой добычей грабителей. Средства к существованию крестьян были ничтожны. Все эти факторы сделали людей бесстрашными.Нашелся человек, который возглавил толпу и объявил себя новым правителем. Мятежники уже захватили много земель. А наш правитель, принимая очередную аудиенцию, был убит ворвавшимися в зал крестьянами. Теперь регенту придется собрать оставшиеся силы и вернуть себе власть!"
 arr.4.a:0 "Что за сборище..."
 
 arr.5.t:0 "§WКрайние меры!"
 arr.5.desc:0 "Группа людей, недовольных нашим правительством, совершила несколько налетов на королевские мастерские. Потребуется время, чтобы восстановить их. Ситуация накаляется..."
 arr.5.a:0 "Найди родителей этих ублюдков!"
 
 arr.6.t:0 "§WНедовольство крестьян!"
 arr.6.desc:0 "В этом году был неурожай, и многие фермеры остались без еды. Многие из них верят, что правительство наняло злых духов, чтобы уморить людей голодом."
 arr.6.a:0 "Чт..."
 
 arr.7.t:0 "§WКоррупция!"
 arr.7.desc:0 "После снижения лояльности населения к вам, к ним вскоре присоединяются дворяне и влиятельные горожане. Они все чаще перестают вам доверять и берут взятки. Из-за этого мы начинаем нести большие убытки. Уровень коррупции вырос..."
 arr.7.a:0 "Снова?!"
 
 arr.8.t:0 "§WДезертирство!"
 arr.8.desc:0 "Недовольство крестьян и солдат продолжает расти! Из-за этого все больше солдат убегают из армии. Нам нужно что-то делать, потому что в долгосрочной перспективе это может стать большой проблемой."
 arr.8.a:0 "Что нам делать?"
 
 arr.11.t:0 "§WВторжение!"
 arr.11.desc:0 "Ничто не предвещало беды, как вдруг вдалеке стали динамические корабли. Рыбакам было все равно, поэтому они никак не отреагировали. Армия искателей приключений успешно высадилась на наши берега и внезапно взяла под свой контроль несколько крепостей в странах. Вам нужно немедленно решить проблему, потому что лидер авантюристов претендует на вашу землю и так просто не сдастся. Кружию!"
 arr.11.a:0 "Черт возьми!"

 arr.9.t:0 "§WПытки!"
 arr.9.desc:0 "Народному недовольству нет предела! Они чаще похищают знатных людей и пытают их. Для начала их накормили горячими котлетами с подливкой из местных пекарей, а потом они начали вытворять такие кощунственные вещи, что даже мне стыдно вам представлять... В общем, они что-то запихивали ему в рот.... гм... ну, вы понимаете..."
 arr.9.a:0 "Окей, я остановлю тебя прямо здесь!"

 tevton.1.t:0 "§WПокупаем Гренландию!"
 tevton.1.desc:0 "Тевтонский орден хочет купить у нас в Гренландии. Они не думают, что нам нужна эта земля, но они будут."
 tevton.1.a:0 "Это выгодная сделка!"
 tevton.1.b:0 "Это важный объект, нет."

 tevton.2.t:0 "§WПокупаем Гренландию!"
 tevton.2.desc:0 "Норвегия согласна продать нам Гренландию."
 tevton.2.a:0 "Это выгодная сделка!"

 tevton.3.t:0 "§WПокупаем Гренландию!"
 tevton.3.desc:0 "Норвегия отказалась продать нам Гренландию."
 tevton.3.a:0 "Это провал!"

 dinbrak.1.t:0 "§WНет наследника!"
 dinbrak.1.desc:0 "Правитель нашей великой страны умер, не оставив законных наследников. Это может стать для нас большой проблемой. В прошлом было много династических браков с правителями других стран, так что они просто уна управляют нами. В то же время, если их притязания не будут слишком великими, мы самостоятельно выберемся нового правителя, и это послужит началу нового закона."
 dinbrak.1.a:0 "Что нам делать?"
 
 dinbrak.2.t:0 "§WВ родственной стране нет наследника!"
 dinbrak.2.desc:0 "Правитель одной из дружественных нам стран умер, не оставив законных наследников. Поскольку мы уже вступили с ними в очень тесное родство, у нас есть законное право на трон. Законы о выборе нового правителя на нашей стороне, так что новым королем будете вы. Новые земли станут нашими. Да здравствует [ROOT.GetName]!"
 dinbrak.2.a:0 "Что же делать?"
 
 dinbrak.3.t:0 "§WСын!"
 dinbrak.3.desc:0 "У вас родился сын. Да здравствует наследник!"
 dinbrak.3.a:0 "Ура!"

 dinbrak.4.t:0 "§WДочь!"
 dinbrak.4.desc:0 "У вас родилась дочь. Да здравствует наследница!"
 dinbrak.4.a:0 "Я хотела мальчика..."
 dinbrak.4.b:0 "Отдайте мне мою дочь!"

 dinbrak.5.t:0 "§WPБеременность!"
 dinbrak.5.desc:0 "Некоторое время назад врач посмотрел вашу жену и обнаружил, что она беременна!"
 dinbrak.5.a:0 "Ура!"
 
 deathgen.1.t:0 "§WСмерть правителя!"
 deathgen.1.desc:0 "Сегодня печальный день! Наш правитель, [ROOT.GetLeader], скончался. Он умер от старости. Несмотря на это, он прожил хорошую жизнь и заслуживает отдельной страницы в истории нашей страны."
 deathgen.1.a:0 "Он был хорошим правителем..."
 
 deathgen.2.t:0 "§WСмерть правителя!"
 deathgen.2.desc:0 "Прогуливаясь по улицам города, наш хозяин решил зайти в пекарню, чтобы перекусить, и заказал знаменитые блинчики с "горячей подливкой". Когда он вернулся в замок, ему стало очень плохо, и у него сильно разболелся живот. Он умер от кровавого поноса..."
 deathgen.2.a:0 "Опять эти котлеты?!"
 
 deathgen.3.t:0 "§WССмерть правителя!"
 deathgen.3.desc:0 "После приятного вечера с наложницей и крепкого сна наш Господин вышел на балкон подышать свежим воздухом. Как обычно, он быстро облокотился на перила, но сразу почувствовал, что что-то не так, но было уже слишком поздно. Какой-то негодяй перепилил перила. [ROOT.GetLeader] разбился насмерть..."
 deathgen.3.a:0 "Он был таким молодым..."
 
 deathgen.4.t:0 "§WТрагедия!"
 deathgen.4.desc:0 "Наш Господь решил хорошо провести время со своей семьей. В качестве отпуска он выбрал поездку в отдаленную деревню. Что могло пойти не так? Вся его многочисленная семья сидела в своих экипажах. Мы на полпути к цели. Вторая часть пути пролегала через холмы. Караван достиг вершины первого крутого холма. И тут вы заметили, как карета быстро начала набирать скорость. Проклятый кучер отвязал лошадей и убежал. В конце концов все экипажи разбились, а члены королевской семьи погибли."
 deathgen.4.a:0 "Черт."
 
 deathgen.5.t:0 "§WСмерть правителя!"
 deathgen.5.desc:0 "Сегодня печальный день! Наш правитель, [ROOT.GetLeader], скончался. Он умер от старости. Несмотря на это, он прожил хорошую жизнь и заслуживает отдельной страницы в истории нашей страны."
 deathgen.5.a:0 "Он был хорошим правителем..."
 
 deathgen.6.t:0 "§WУбийство!"
 deathgen.6.desc:0 "Возвращаясь домой из очередной поездки, карета внезапно замедлила ход и остановилась. Вы спросили кучера, что случилось, но в ответ ничего не услышали. Карета была открыта незнакомцем, и вам все стало ясно. Перед вами грабители, а кучера подкупили. Ты пытался откупиться от них любой суммой денег и обещаниями, но все, чего они хотели, - это твоей крови..."
 deathgen.6.a:0 "Шпионы, они повсюду!»
 
 deathgen.7.t:0 "§Wприятная смерть!"
 deathgen.7.desc:0 "Все шло своим чередом. Твои руки нежно скользили по ее бедрам, опускаясь все ниже и ниже. Поцелуй был идеальным. Ни одна девушка еще никогда не доставляла такого огромного удовольствия. Твое сердце билось все быстрее и быстрее, и ты получал все больше и больше приятных ощущений. В конце концов, вам стало так хорошо, что ваше сердце чуть не выпрыгнуло из груди. Вы почувствовали внезапную сильную боль в груди, и вам сразу стало плохо. Ваше неуправляемое тело устремилось вниз, и вскоре вы уже лежали на полу. Сердце Господа остановилось от удовольствия. Он умер неожиданно для всех, но, скорее всего, самым приятным образом..."
 deathgen.7.a:0 "Он в порядке."
 
 msk.1.t:0 "§WЯзыческий ультиматум"
 msk.1.desc:0 "Москва направила нам ультиматум с требованием принять славянское язычество. По их мнению, приняв православие, русские утратили свою культуру и историю. В противном случае они объявят нам войну."
 msk.1.a:0 "Мы слишком долго разочаровывались в своей религии..."
 msk.1.b:0 "Изменим нашу религию?!"
 
 msk.2.t:0 "§WЯзыческий ультиматум"
 msk.2.desc:0 "[FROM.GetName] приняли ваше требование! Теперь они такие же язычники, как и мы! В честь этого события мы устроим пир."
 msk.2.a:0 "Отлично."
 
 msk.3.t:0 "§WЯзыческий ультиматум"
 msk.3.desc:0 "[FROM.GetName] отказался принять наши требования! Пришло время преподать этим глупцам урок!"
 msk.3.a:0 "К битве!"
 
 msk.4.t:0 "§WЗапрос из Москвы"
 msk.4.desc:0 "Москва недавно приняла католичество и теперь просит нас о любой помощи, чтобы повлиять на регион. Что мы должны им послать?"
 msk.4.a:0 "Большой сундук с золотом."
 msk.4.b:0 "Солдат."
 msk.4.c:0 "Пусть они сами во всем разберутся!"
 
 msk.5.t:0 "§WЗапрос из Москвы"
 msk.5.desc:0 "Москва недавно приняла католичество и теперь просит нас о любой помощи, чтобы повлиять на регион. Что мы должны им послать??"
 msk.5.a:0 "Большой сундук с золотом."
 msk.5.b:0 "Солдат."
 
 msk.6.t:0 "§WКонтракт с Богемией"
 msk.6.desc:0 "Некоторое время назад мы предложили Чехии взаимные гарантии. Учитывая недавнюю ситуацию, это соглашение вполне могло быть достигнуто. Однако Чехия отказалась от этого предложения..."
 msk.6.a:0 "Черт возьми!"
 
 msk.7.t:0 "§WКонтракт с Богемией"
 msk.7.desc:0 "Наша миссия увенчалась успехом, и мы смогли заключить контракт с Чехией. Теперь нас по праву можно назвать союзниками!"
 msk.7.a:0 "Отлично."
 
 msk.8.t:0 "§WСоюз с Москвой"
 msk.8.desc:0 "Москва предлагает укрепить взаимную выгоду от общей религии. Они хотят заключить с нами союз."
 msk.8.a:0 "Окей."
 msk.8.b:0 "Никакого союза не будет."
 
 msk.9.t:0 "§WЗапрос из Москвы"
 msk.9.desc:0 "Москва недавно приняла католичество и теперь просит нас о любой помощи, чтобы повлиять на регион. Что мы должны им послать?"
 msk.9.a:0 "Большой сундук с золотом."
 msk.9.b:0 "Солдат."
 
 msk.10.t:0 "§WКонтракт с Болгарией"
 msk.10.desc:0 "Некоторое время назад мы предложили Чехии взаимные гарантии. Учитывая недавнюю ситуацию, это соглашение вполне могло быть достигнуто. Однако Болгария отказалась от этого предложения..."
 msk.10.a:0 "Черт возьми!"
 
 msk.11.t:0 "§WКонтракт с Богемией"
 msk.11.desc:0 "Наша миссия увенчалась успехом, и мы смогли заключить контракт с Болгарией. Теперь мы по праву можем называться союзниками!"
 msk.11.a:0 "Отлично."
 
 news.1003.t:0 "§WЕресь папы Римского!"
 news.1003.d:0 "Сегодня утром Папа Римский объявил всему миру, что он еретик и уже давно не является католиком. За это время ему удалось дехристианизировать многие страны, а также укрепить свое влияние в регионе. Было бы глупо разглашать это, поскольку это очень опасно, но папа позаботился об этом вопросе. Он заручился гарантиями и поддержкой языческих правителей, а также подчинил себе все свое ближайшее окружение. Папа Римский утратил свой сан и больше таковым не является, а Папская область стала называться просто Римом. Новый глава католицизма будет избран в ближайшие дни. Что произойдет в Европе после этих событий? Покажет только время."
 news.1003.a:0 "Неожиданно."
 
 news.1004.t:0 "§WТамплиеры в опасности!"
 news.1004.d:0 "Совершенно неожиданно, пару дней назад, орден тамплиеров был объявлен во Франции вне закона. Начались преследования и аресты членов ордена. Рыцарей обвиняют в богохульстве, разврате, содомии и скотоложстве. Это была хорошо спланированная операция, поэтому тамплиеры были застигнуты врасплох. Большинство участников были брошены в тюрьму, но 57 рыцарей были сожжены на костре. В том числе был сожжен Жак де Моле, магистр ордена.Существуют легенды, что когда Жак де Моле стоял в огне, он вызвал французского короля Филиппа IV, своего советника и папу римского на Божий суд. Уже окутанный клубами дыма, тамплиер пообещал королю, советнику и папе римскому, что они переживут его не более чем на год..."
 news.1004.a:0 "Неожиданно."
 
 news.1005.t:0 "§WПрисоединение Полоцка!"
 news.1005.d:0 "Видя растущую мощь своего литовского соседа, Полоцк решил добровольно присоединиться к Великому княжеству Литовскому. Таким образом, удалось избежать возможных военных столкновений. Слава Витеню!"
 news.1005.a:0 "Хорошие новости."
 
 news.1006.t:0 "§WКризис!"
 news.1006.d:0 "Папа Римский объявил о новом крестовом походе, целью которого является возвращение Святой земли и уничтожение еретиков. Крестоносцам предстоит пройти долгий путь, прежде чем их цель будет достигнута. Однако никто не исключает, что кампания может провалиться. Пришло время помолиться о победе! Аве Мария! "
 news.1006.a:0 "Деус вульт!"
 
 news.1007.t:0 "§WПапа и Филипп"
 news.1007.d:0 "В последнее время отношения между папой Римским и королем Франции Филиппом IV ухудшились. Филипп недоволен великой властью папы и его пребывания церковными налогами. Ходят слухи, что Франция приближается к войне с Папской областью. Тучи сгущаются..."
 news.1007.a:0 "Что будет дальше?"

 news.1008.t:0 "§WSШведская кампания"
 news.1008.d:0 "Швеция при поддержке Папской области войны против Новгорода. Цель кампании - захватить земли местных язычников. Новгород пережил множество войн. Переживет ли Республика еще один конфликт? Покажет только время."
 news.1008.a:0 "Все как обычно."

 news.1009.t:0 "§Гражданская война в Ацтеках"
 news.1009.d:0 "Императрица ацтеков Синтея попыталась централизовать государство с помощью реформы. Многие из вассальных городов вызвали недовольство, и проблемы народных волнений. Это переросло в полноценную гражданскую войну! Стороны борются за свои права и власть. Никто не знает, чем это закончится..."
 news.1009.a:0 "Интригующе."

 news.1010.t:0 "§ВАцтекская экспедиция!"
 news.1010.d:0 "Флот ацтеков плыл днями и ночами. И вот, наконец, появилась новая земля! Это была Европа. Ацтеки яростно оккупировали побережье и начали разбивать свои лагеря. Вероятно, новости о пришельцах уже местных правителей, и они в замешательстве. Никто не мог ожидать такого хода истории..."
 news.1010.a:0 "Исследователи стали исследованными!"

 news.1011.t:0 "§WХулагуиды и Золотая Орда!"
 news.1011.d:0 "Только что поступила информация о том, что Хулагуиды и Золотая Орда заключили союз. В будущем это может сильно изменить ситуацию в странах."
 news.1011.a:0 "Что будет дальше?"

 news.1012.t:0 "§WMамлюки и Золотая Орда!"
 news.1012.d:0 "Мы только что получили информацию о том, что мамлюки и Золотая Орда заключили союз. В будущем это может сильно изменить ситуацию в странах."
 news.1012.a:0 "Что будет дальше?"

 news.1013.t:0 "§WПоходы Литвы!"
 news.1013.d:0 "Завершены последние приготовления к литовским походам. Войны подготовлены, мечи наточены, пришло время идти в бой. Смогут ли соседи остановить наше наступление, или их быстро втопчут в грязь?"
 news.1013.a:0 "..."

 news.1014.t:0 "§WЛитовская Конфедерация"
 news.1014.d:0 "В самом сердце Восточной Европы было создано новое объединение - Литовская конфедерация. Ее цель - объявить все ведущие народы в один сильный политический блок. "
 news.1014.a:0 "..."

 news.1015.t:0 "Праздник §WA в Мюнхене"
 news.1015.d:0 "Людвиг И.В. Баварский устроил в своем замке цветочный банкет, пригласив к нему всех влиятельных дворян. Это улучшит к классу. Однако многие думают, что Людвиг просто не умеет тратить деньги. Однако, скорее всего, тратить уже нечего. Все тратят на праздник."
 news.1015.a:0 "Все любят поесть."

 news.1016.t:0 "§WСмерть Эдварда"
 news.1016.d:0 "Э Эдуард I, король Англии и просто хороший человек, погиб на поле боя. На трон Англии взошел его сын Эдуард II. Сможет ли новый правитель снова подчинить Шотландию и сохранить стабильность в стране? Покажет только время."
 news.1016.a:0 "*Подавился вином*"

 news.1017.t:0 "§WКитайский шторм"
 news.1017.d:0 "В Китае началась масштабная кровопролитная гражданская война! Империя раскололась на 6 частей. Пятеро из них сошлись на поле боя за право править Китаем. Тайвань провозгласил свою независимость и решил не воевать. Корея, почувствовав слабость, захватила древние территории Кореи, которые вызвали время включения Китая. Пришло время перемен..."
 news.1017.a:0 "Война началась."
 
 news.1018.t:0 "§WКонтракт Кальтабеллотта"
 news.1018.d:0 "Закончилась арагонско-неаполитанская война. Войска Хайме II полностью разгромили неаполитанскую армию во главе с Карлом II Анжуйским. Согласно договору, Сицилия и Неаполь воссоединяются, но теперь Неаполь является вассалом Арагона."
 news.1018.a:0 "Всему есть конец."

 news.1019.t:0 "§WHОхота на Ногая"
 news.1019.d:0 "Долгое время Ногай, правитель Западного улуса Золотая Орды, не подчинялся. Чтобы усмирить его, хан Тохта собрал большое войско и смертельно опасный внезапный удар."
 news.1019.a:0 "Ногай обречен».

 news.1020.t:0 "§WКампания в Сонхай"
 news.1020.d:0 "В течение нескольких лет в Мали наблюдалась тишина внутри помещения, что привело к восстаниям в Уагадугу и Сонгаи. Мали вернулась к себе Моси. Теперь пришло время вернуть сонгаи..."
 news.1020.a:0 "Кампания начинается..."

 news.1021.t:0 "§WВыходим из изоляции!"
 news.1021.d:0 "После многих лет восстановления после монгольского завоевания Китай покинул страну. Это тревожные новости для наших соседей и для континента в целом. Что будет дальше?"
 news.1021.a:0 "Гигант пробуждается..."

 news.1022.t:0 "§WПрисоединение Арбореи!"
 news.1022.d:0 "Видя растущую мощь Лацио, соседи начинают опасаться. Лацио почувствовал это, поэтому выдвинул условия для Древнего суда. Он должен уйти добровольно. В конце концов, Мариано принял условия, не желая проливать кровь."
 news.1022.a:0 "Мир жесток."

 news.1023.t:0 "§WАрборея сопротивляется!"
 news.1023.d:0 "Губернатор Лацио ввел ужасные условия в Арборейском суде. Тщательно взвесив все возможные варианты развития событий, Мариано решил бороться до конца. Да здравствует Арборея!"
 news.1023.a:0 "Мир жесток."

 news.1024.t:0 "§WВеликое княжество Московское!"
 news.1024.d:0 "Москва возвысилась за эти славные годы! Страна стала сильнее всех своих соседей и по праву может называться Великим Княжеством. Слава Юрию!"
 news.1024.a:0 "Новая гегемония".

 news.1025.t:0 "§WСоюз Азиатских Республик!"
 news.1025.d:0 "Китай создал Южно-Африканскую республику. Его цель - придумала Азиатскую республику, чтобы контролировать торговлю в регионах, или что-то большее..."
 news.1025.a:0 "Новый политический блок".

 news.1026.t:0 "§WОрда в ярости!"
 news.1026.d:0 "Золотая Орда в очередной раз взимает дань с окрестных земель. Некоторые княжества устали платить и готовиться к войне. Также в случае, если идут слухи, что в неповиновении Орда захватит всю Русь."
 news.1026.a:0 "Что будет дальше?!"

 news.1027.t:0 "§WВремя действовать!"
 news.1027.d:0 "Опасения по поводу Орды подтвердились. Они зашли захватить всю Русь и включить ее в свой состав. Однако русский дух силен. Если русские объединятся против Орды, у них появится шанс."
 news.1027.a:0 "Тёмные времена для России».

 news.1028.t:0 "§WРеволюция Гедиминаса!"
 news.1028.d:0 "Всем известно, что снижение стабильности и поддержка контрольного барьера проблемы. Однако это произошло в Литве. Власть захватил сына Витена, Гедимин. Он получил большую поддержку среди крестьян и знати."
 news.1028.a:0 "Новая страница истории Литвы».

 news.1029.t:0 "§WФранкская империя!"
 news.1029.d:0 "После серии успешных президентов Филиппа IV вы объявили о восстановлении Франкской империи! За этим следует интеграция салов в новую империю. Еще несколько лет назад никто и не думал, что такое произошло."
 news.1029.a:0 "Интересно."

 news.1030.t:0 "§WУтреня в Брюгге"
 news.1030.d:0 "Неожиданно, когда армия Филиппа ушла, фламандцы подняли восстание. Началась резня, в результате которой погибло около 4000 человек. Затем армия двинулась вперед и встретилась в бою с французами. В результате французские рыцари потерпели поражение, и Франция вскоре обрела независимость."
 news.1030.a:0 "Интересно."

 news.1031.t:0 "§WПриветствие"
 news.1031.d:0 "Добро пожаловать в модификацию "Старая Европа 1300"! Этот мод повествует о событиях с 1300 по 1315 год. Борьба за власть в Священной Римской империи, Северная война Осграфов, экспансия Османской империи, борьба за Богемское наследство, война за Сирию, завоевание Литвы, борьба русских княжеств против Золотой Орды и т.д. — все это вы видите в нашем режиме.\n В моде много новых механик, которые применяются в вашей игре. В некоторых местах вы можете получить подсказку, нажав на вопросительный знак.
 news.1031.a:0 "Продолжить."
 news.1031.b:0 "Начать игру."
 
 news.1032.t:0 "§WПриветствие"
 news.1032.d:0 "Больше всего информации имеется в статьях в группе ВКОНТАКТЕ.\n Чтобы не разваливаться в самом начале игры, рекомендуется распределить расходы на содержание мастерских и армии. В случае потери недовольства населения будет расти, что в конечном итоге может привести к поражению.\n Если вам понравилась мода, поддержите нас на Patreon и подпишитесь на группу ВКОНТАКТЕ."
 news.1032.a:0 "Начать игру."
 news.1032.b:0 "Начать игру."

 news.1033.t:0 "§WПроизводство"
 news.1033.d:0 "[FROM.GetName] занимается производством мануфактур. Как показала практика, этот вид продукции дешевле, качественнее и выпускается массово. Благодаря этому по всей стране начали открываться фабрики. Вперед к процветанию!"
 news.1033.a:0 "Рентабельный..."

 news.1034.t:0 "§WПереход к феодализму"
 news.1034.d:0 "Нация [FROM.GetName] переходит к феодализму. Десятилетия существования и эволюции привели к тому, что на самом деле появился более эффективный тип правления."
 news.1034.a:0 "Цивилизованные дикари?"

 news.1035.t:0 "§WВторжение в Канбу"
 news.1035.d:0 "Авантюрист, известный в наших кругах, как Канбу Великий, собирается создать великую армию. Он хочет убедить всю Африку под властью одной страны и возглавить империю к процветанию. У него уже есть большая поддержка, и он собрал огромную армию. Он уже захватил большую часть региона Сонгай."
 news.1035.a:0 "..."
 
 ####01.05.2020
 news.1036.t:0 "§WСеверная маркграфская война" #
 news.1036.d:0 "О масштабах событий можно только догадываться, но уже сейчас ясно, что война не будет быстрой. В регионе за господство на юге Балтийского моря столкнулись Дания, Мекленбург, Шлезвиг-Гольштейн, Померания, Тевтонский орден, с одной стороны, и Бранденбург с Ганзейским союзом - с другой. Кто победит в этом локальном конфликте?"
 news.1036.a:0 "Хм..."

 news.1037.t:0 "§WМосковский Султанат" #
 news.1037.d:0 "Москва приняла ислам на официальном уровне. Теперь их правитель криптовалют себя султаном, своим государством - султанатом."
 news.1037.a:0 "Ислам становится сильнее».

 news.1038.t:0 "§WФранкская империя" #
 news.1038.d:0 "План Филиппа IV выполнен! Захватив соседние страны, французы добились автономии, дав воображаемое ощущение свободы. Однако, когда Франция была полностью готова, она полностью захватила завоеванные земли, достигнув таким образом границ Франкской империи!
 news.1038.a:0 "Новая европейская угроза".

 news.1039.t:0 "§WРимская империя" #
 news.1039.d:0 "На протяжении всего столетия Византия претендовала на то, чтобы быть прямой наследницей Римской империи, но не все обращали на это внимание, потому что масштабы империи уже не для меня. Несмотря на это, Византия справилась с проблемами и успешно развивала землю. Римская империя возрождается!»
 news.1039.a:0 "Все дороги ведут в Рим."

 news.1040.t:0 "§WИрландия" #
 news.1040.d:0 "Начиная с IX века, англичане неоднократно нападали на ирландские поселения и в конце концов начали захватывать земли. К 1300 году почти все земли Ирландии находились под влиянием или контролем Англии. Как бы то ни было, произошло чудо. Ирландия была объединена в единое королевство и стала в значительной степени противовесом соперникам."
 news.1040.a:0 "Свобода!"

 news.1041.t:0 "§WРоссия" #
 news.1041.d:0 "Эпоха раздробленности продолжалась постепенно, являясь важным этапом в развитии русского общества. Однако завоевание Монгольской империи привело к шаткому и позорному положению. Медленно, но верно Русь объединилась. Объединение России завершено, противники повержены, и все дороги открыты».
 news.1041.a:0 "Мы едины!"

 news.1042.t:0 "§WХаос в СРИ" #
 news.1042.d:0 "Стабильность Священной Римской империи резко упала, поскольку не все народы согласны с положениями в делах. Некоторые сохраняют верность императору Альбрехту, в то время как другие говорят, что Вацлав II больше подходит для этой кандидатуры».
 news.1042.a:0 "Что будет дальше?"
 
 
 news.1043.t:0 "§R[ROOT.GetName]!" #
 news.1043.d:0 "Правитель государства [ROOT.GetName] становится императором Священной Римской империи!"
 news.1043.a:0 "..."

 news.1044.t:0 "§OЭкономическое чудо!" #
 news.1044.d:0 "Штат [FROM.GetName] - это экономическое чудо! В этом штате комплексных торговцев со всего региона (их EDI достиг 10 000.)"
 news.1044.a:0 "Экономическое чудо?"

 dip.1.t:0 "Экономическая интеграция"
 dip.1.desc:0 "Поскольку мы ограничиваем только с одним из европейских государств, то есть являемся анклавом, мы становимся экономически зависимыми от соседнего государства.
 dip.1.a:0 "!#?@!?"

 dip.2.t:0 "Экономические изменения"
 dip.2.desc:0 "Коммерсанты массово уезжают в штат [FROM.GetName], потому что там условия намного лучше. \n (Их EDI выше, чем у нас)"
 dip.2.a:0 "Что?"

 dip.3.t:0 "Экономические изменения"
 dip.3.desc:0 "Наше экономическое давление на государство увенчалось успехом! Торговцы массово переезжают из своей страны к нам, привозя с собой высококачественное железо."
 dip.3.a:0 "Хорошо"
 
 dip.4.t:0 "Экономические изменения"
 dip.4.desc:0 "Наше экономическое давление на государство [FROM.GetName] увенчалось успехом! Торговцы массово переезжают из своей страны к нам, привозя с собой качественное золото."
 dip.4.a:0 "Хорошо"
 
 dip.5.t:0 "Экономические изменения"
 dip.5.desc:0 "Наше экономическое давление на государство [FROM.GetName] увенчалось успехом! Торговцы массово переезжают из своей страны к нам, привозя с собой древесину."
 dip.5.a:0 "Хорошо"
 
 dip.6.t:0 "Экономические изменения"
 dip.6.desc:0 "Наше экономическое давление на государство [FROM.GetName] увенчалось успехом! Торговцы массово переезжают из своей страны к нам, привозя с собой рабов."
 dip.6.a:0 "Хорошо"
 
 dip.7.t:0 "Экономические изменения"
 dip.7.desc:0 "Наше экономическое давление на государство [FROM.GetName] увенчалось успехом! Торговцы массово переезжают из своей страны к нам, привозя с собой медь."
 dip.7.a:0 "Хорошо"
 
 dip.8.t:0 "Экономические изменения"
 dip.8.desc:0 "Наше экономическое давление на государство [FROM.GetName] увенчалось успехом! Торговцы массово переезжают из своей страны к нам, привозя с собой ткани."
 dip.8.a:0 "Хорошо"
 
 ink.1.t:0 "Святая инквизиция"
 ink.1.desc:0 "Сегодня наш король подписал закон, главным пунктом которого стало создание "священного отдела по расследованию еретической греховности". По всей стране начались еврейские погромы, вспыхнули костры. Женские крики и мужские слезы наполнили города. Кто-то кричит от радости, что его ненавистного соседа увезли, а кто-то от вида своей жены или дочери, горящих на костре..."
 ink.1.a:0 "Аминь!"
 
 ink.2.t:0 "Последний удар"
 ink.2.desc:0 "Борьба, начавшаяся 6 веков назад, наконец-то подходит к концу. Вот уже полторы тысячи лет мы сражаемся за освобождение наших земель от мавров. Пришло время нанести последний удар и завершить дело, начатое нашими предками."
 ink.2.a:0 "Не щади никого!"
 
 ink.3.t:0 "Испанская армада"
 ink.3.desc:0 "Наши отважные рыцари охраняют границы нашего королевства, но наше побережье беззащитно перед лицом грозного врага, пришло время положить этому конец."
 ink.3.a:0 "Больше кораблей!"
 
 ink.4.t:0 "Благословение Господне"
 ink.4.desc:0 "О, мой дорогой Иисус, пожалуйста, благослови и защити нас, Твою Священную группу молитвенной кампании, чтобы мы стали неуязвимы для атак дьявола и любых злых духов, которые могут мучить нас в этой Священной миссии по спасению душ. Чтобы мы могли оставаться верными и сильными, продолжая упрямо прославлять Твое Святое Имя перед всем миром и никогда не прекращая нашей борьбы за распространение Истины Твоего Святого Слова. Аминь."
 ink.4.a:0 "Аве Мария деус вульт"
 
 ink.5.t:0 "§WУльтиматум"
 ink.5.desc:0 "Сегодня из Толедо пришло письмо с ультиматумом. Они требуют нашего добровольного участия. Если мы откажемся, они угрожают отобрать землю силой. Что мы должны сказать?"
 ink.5.a:0 "Мы встанем на колени..."
 ink.5.b:0 "Это война!"
 
 ink.6.t:0 "§WУльтиматум"
 ink.6.desc:0 "Сегодня из Толедо пришло письмо с ультиматумом. Они требуют нашего добровольного участия. Если мы откажемся, они угрожают отобрать землю силой. Что мы должны сказать?"
 ink.6.a:0 "Мы встанем на колени..."
 ink.6.b:0 "Это война!"
 
 ink.7.t:0 "Они все поняли неправильно."
 ink.7.desc:0 "Когда мы направляли послание в Рим, где обещали им сближение между нашими государствами, мы имели в виду территориальное сближение и, что очень важно, сжатие."
 ink.7.a:0 "Ну что, папа, Господь тебя спасет?"

 jop.1.t:0 "Свержение Императора"
 jop.1.desc:0 "Сегодня утром были схвачены верные императору люди, и его больше всего взяли под охрану. Власть уже выступила вторым, но император всячески препятствовал ему. Теперь вся Япония в руках Хисааки. И кто знает, куда это нас заведет."
 jop.1.a:0 "Он был жалок"

 jop.2.t:0 "Выход из тени"
 jop.2.desc:0 "Прошло много времени с тех пор, как был захвачен власть в Японии. Но в конце концов император Го-Фусими решил поднять оружие против Камакуры. Сам Сегун был убит своими же людьми."
 jop.2.a:0 "За Императора!"
 
 jop.3.t:0 "§WУльтиматум"
 jop.3.desc:0 "Сегодня из Киото пришло письмо с ультиматумом. Они требуют нашего добровольного присоединения. В случае отказа они угрожают отобрать земельную силу. Что мы должны сказать?"
 jop.3.a:0 "Мы встанем на колени вниз..."
 jop.3.b:0 "Должна быть война!"

 jop.4.t:0 "Поджоги"
 jop.4.desc:0 "По всей стране происходят массовые поджоги складов оружия, домов самураев и чиновников, лояльных сегуну."
 jop.4.a:0 "Как это?"

 jop.5.t:0 "Тайные встречи"
 jop.5.desc:0 "Участились случаи массовых, и не очень, женских посиделок. Они могут проводиться как в саду, так и дома. Понятно, что в этом нет ничего особенного, но их частота вызывает тревогу."
 jop.5.a:0 "Здесь что-то не так."

 jop.6.t:0 "Недовольство"
 jop.6.desc:0 "В последнее время жены стали чаще не подчиняться приказам своих мужей. У них даже хватает наглости спорить с ними и повышать голос. Несколько особенных непослушных уже были приговорены к смертной казни, но это только усилило состояние в семьях."
 jop.6.a:0 "Куда это нас приведет?"

 jop.7.t:0 "Новые идеи"
 jop.7.desc:0 "Все чаще и чаще в атмосфере стали витать идеи равенства мужчин и женщин. Яркие идеи этих идей осуществляют скрытую пропаганду, а главные проповедники татуируют себя в виде дракона, летящего среди ветвей сакуры - символа их равенства."
 jop.7.a:0 "Нас ждут серьезные перемены..."

 jop.8.t:0 "Пропаганда в чайных домах"
 jop.8.desc:0 "Если раньше новые идеи распространялись в основном только среди женщин, то теперь мужчины, приезжающие отдохнуть, стали чаще слышать эту болтовню от куртизанок."
 jop.8.a:0 "Они уже повсюду?!"

 jop.9.t:0 "Женские манипуляции"
 jop.9.desc:0 "Женские чары заявляют. Они обволакивают мужчин одного за другого. Из-за этого число представлений только растет, ходят слухи, что жена самого императора тоже обеспокоена со всеми этим."
 jop.9.a:0 "Они не сидят сложа руки"

 jop.10.t:0 "Онна-бугейсия"
 jop.10.desc:0 "Похоже, что многие женщины-самураи присоединились к представителям нового порядка."
 jop.10.a:0 "Этого следовало ожидать"

 jop.11.t:0 "Тренировочные сборы"
 jop.11.desc:0 "Похоже, что одни слова они не ограничиваются. По всей Японии получают подпольные школы, обучающие самурайскому образованию обычных женщин. Их обучают как женщины-самураи, так и мужчины. Люди, лояльные сегуну, раскрывают свое местонахождение и называют учителей. Среди них есть и высокопоставленные чиновники."
 jop.11.a:0 "Пусть головы летят"
 
 jop.12.t:0 "Бандитские рейды"
 jop.12.desc:0 "Как мы и ожидали, если раньше они освободились от одиноких людей или новых поджогов, то теперь открыто нападают на дома людей, лояльных в следующий раз. Из-за этого им приходится тратить много денег на охрану, нанимая ронинов на местах."
 jop.12.a:0 "Когда это закончится"

 jop.13.t:0 "Охота самураев"
 jop.13.desc:0 "По всей стране происходят массовые нападения на самураев, преданных сегунов, - наступление на дорогах, в городах, в чайных домиках и даже во дворцах."
 jop.13.a:0 "..."

 jop.14.t:0 "Наши люди"
 jop.14.desc:0 "Прошло много времени с тех пор, как началось распространение новых идей. Многие женщины заплатили за это своей жизнью, но их жертвы были не напрасны, большое количество мужчин стали все больше прислушиваться к своим женам и их идеям."
 jop.14.a:0 "Наши идеи обязательно победят"

 jop.15.t:0 "Ещё убийств"
 jop.15.desc:0 "Убийства продолжаются, мужчины, которые когда-то убивали своих жен, теперь боятся любого проходящего мимо девушки, они ничего себе не выдают, мило улыбаются, кланяются, а потом достают нож и вонзают ему прямо в горло, чтобы он умирал долго и мучительно."
 jop.15.a:0 "Зверства"

 jop.16.t:0 "Убийство сёгуна"
 jop.16.desc:0 "Сегодня хороший день для всей Японии. Сегун, который все это время не покидал своего президента, решил лично уничтожить одного из организационных лагерей, но почти сразу же был убитой женщиной-самураем. Он даже не успел взмахнуть мечом, как почувствовал острую боль и слабость в ногах. Упав на землю, он долго лежал, исчезнув кровью, и наблюдал, как один за другим умирают его люди. Узнав об этом, вся Япония вспыхнула».
 jop.16.a:0 "Давайте отметим этот день"

 jop.17.t:0 "Выборы"
 jop.17.desc:0 "Сегодня во время очередного налета на китайский корабль погибла наша дорогая Йоко. Мерзкая китайская свинья ударила ее ножом в спину, когда она спасала моряка, упавшего за борт. Свинья, конечно, тут же вылетела за борт с перерезанным горлом, но это не вернет нам Йоку. Пора двигаться дальше и выбрать нового лидера. Первый - Садаши, опытный капитан и хороший боец, правая рука Йоко. Второй пират, захваченный Йогой в Сингапуре, хитрый и ловкий тип, который позже стал ее женой, и мы выбеременны?"
 jop.17.a:0 "Мы выбираем Садаши"
 jop.17.b:0 "Наш выбор — пиратка Сузуме"

 hul.1.t:0 "Ильханство требует подарков"
 hul.1.desc:0 "Мой господин, прибыль послы Ильханата. Они сообщают нам, что мы должны немедленно отправить деньги в качестве денег, чтобы обеспечить нашу суверенитет. Что мы им отвечаем?"
 hul.1.a:0 "Я отдам дань"
 hul.1.b:0 "Отправьте хану их головы"

 hul.2.t:0 "Ильханство требует подарков"
 hul.2.desc:0 "Мой господин, прибыль послы Ильханата. Они сообщают нам, что мы должны немедленно отправить деньги в качестве денег, чтобы обеспечить нашу суверенитет. Что мы им отвечаем?"
 hul.2.a:0 "Я отдам дань"
 hul.2.b:0 "Отправьте хану их головы"

 hul.3.t:0 "Ильханство требует подарков"
 hul.3.desc:0 "Мой господин, прибыль послы Ильханата. Они сообщают нам, что мы должны немедленно отправить деньги в качестве денег, чтобы обеспечить нашу суверенитет. Что мы им отвечаем?"
 hul.3.a:0 "Я отдам дань"
 hul.3.b:0 "Отправьте хану их головы"

 mam.1.t:0 "Посол мамлюков"
 mam.1.desc:0 "Сегодня сюда прибыл посол из Каиры. Он утверждает, что в связи с интересами его государства мы должны передать им все наше побережье Красного моря. Что мы должны сказать?"
 mam.1.a:0 "Мы это сделаем."
 mam.1.b:0 "Убей его"

 mam.2.t:0 "Крах династии Хулагуидов"
 mam.2.desc:0 "После захвата нами трех важнейших крепостей персидская элита увидела слабость монгольского владычества и свергла его."
 mam.2.a:0 "Это только начало"

 dea.3.t:0 "Дмитровский конгресс"
 dea.3.desc:0 "Принц вернулся с мира."
 dea.3.a:0 "Хорошие новости"

 dea.7.t:0 "Смерть Ивана Дмитриевича"
 dea.7.desc:0 "Иван, женатый на дочери великого князя Дмитрия Борисовича Ростовского, умер бездетным, завещав свое наследство своему младшему дяде Даниилу Московскому."
 dea.7.a:0 "Покойся с миром"

 dea.8.t:0 "Смерть Андрея Александровича"
 dea.8.desc:0 "Великий Князь Владимирский умер, и пришло время выбрать нового. Князь Московский и Тверской уже направляются в Сарай. Перед смертью Андрей Владимирский завещал свое княжество Михаилу Тверскому, однако у Юрия Московского есть свои претензии. Кого выберете хан?"
 dea.8.a:0 "Тверь"
 dea.8.b:0 "Москва"

 oth.12.t:0 "Предложение Твери"
 oth.12.desc:0 "Мой господин, тверской предлагает нам произнести речь в единое государство. В такое неспокойное время князя это может быть шансом на выживание.."
 oth.12.a:0 "Я согласен"
 oth.12.b:0 "Мы останемся союзниками."

 oth.13.t:0 "Ответ Литвы"
 oth.13.desc:0 "Великий князь Литовский отклонил наше предложение. Но он дал, что мы остаемся друзьями и можем рассчитывать на его армию.."
 oth.13.a:0 "Надеюсь, он сдержит свое слово."

 news.1045.t:0 "§WАнглия становится членом СРИ!!"
 news.1045.d:0 "Очевидно, никто не ожидал такого поворота событий. Многие думали, что после распада Франции Эдуард вступит в войну с ОПЧ, но ни в коем случае не станет ее членом. Что это было вообще, покажет только время."
 news.1045.a:0 "..."

 news.1046.t:0 "§WАнглийский эндшпиль!"
 news.1046.d:0 "Сегодня король Эдуард раскрыл все свои карты, его армия вместе с привлечением своих союзников движется на юг. Монархи, которые не присягнули на верность Эдуарду, собирают свои войска и выступают, чтобы поддержать его. Кажется, что на карте поставлено все."
 news.1046.a:0 "Этого следовало ожидать..."

 news.1047.t:0 "Гражданская война в Японии"
 news.1047.d:0 "В Японии вспыхнула гражданская война. Император вместе со своими сторонниками восстал против сегуната. Верные ему люди захватили Осаку и Киото, где находился император. Стороны не готовы отступать."
 news.1047.a:0 "Очередная разборка на краю света"

 news.1048.t:0 "§WВозвращение династии Сасанидов!"
 news.1048.d:0 "Интересные новости приходят из далекой Персии. Спустя 6 с половиной столетий власть снова перешла в руки династии Сасанидов.
 news.1048.a:0 "Нам остается только смотреть"

 news.1049.t:0 "§WДжихад!"
 news.1049.d:0 "Из Каиры приходят тревожные новости. Здешний султан, явно воодушевленный имамами, объявил о начале джихада. Его держали десятки, если не сотни, тысяч солдат. на кого падет взгляд султана и как далеко он готов зайти."
 news.1049.a:0 "Это тревожно."

 news.1050.t:0 "§WВосстановление Карфагена!"
 news.1050.d:0 "Интересные новости приходят из Северной Африки, Карфаген, некогда разрушенный Римом, восстановлен. Знаменитый порт также был построен заново, архитекторы полностью покинули Европу его прежнего облика, о дошедших до нас описаниях и изображениях. В настоящее время Карфаген является столицей нового Карфагенского эмирата. Сотни торговцев со всей Европы съехались в город, несмотря на протест Папского престола."
 news.1050.a:0 "Султан не перестает удивлять"

 news.1051.t:0 "§WПадение государства Хулагуидов§!"
 news.1051.d:0 "С момента падения государства не удалось пройти и полувека, как власть монголов пала на земле персов. Мамлюки, Нанеся ряд признаны пораженными чужеземной армией, фактор, что монголы не всесильны и их можно победить. Сам Хан исчез в неизвестном направлении, и его империя влияет на глаза. Соседние и местные правители, не упускающие возможности, уже начали делить ее на части."
 news.1051.a:0 "Любопытно"
 
 news.1052.t:0 "§WDмитровский съезд!"
 news.1052.d:0 "Чтобы положить конец междоусобице, в городе Дмитрове состоялся съезд четырех русских князей, в состав которых вошли: великий князь Владимирский Андрей Александрович, князь тверской Михаил Ярославич, князь московский Даниил Александрович и князь переславский Иван Дмитриевич. Братоубийственных войн? Покажите только время."
 news.1052.a:0 "Любопытно"

 news.1053.t:0 "§WНовый Великий Герцог!"
 news.1053.d:0 "После смерти великого князя Андрея Александровича Владимирского началась борьба между Москвой и Тверью за великое княжение. Сам Андрей завещал княжение Михаилу Ярославичу, но Юрий Даниилович также выдвинул свои силы. Поразмыслив, хан отдал ярлык князю Тверскому, который по праву стал называться великим».
 news.1053.a:0 "Это начало войны"

 news.1054.t:0 "§WНовый Великий Герцог!"
 news.1054.d:0 "После смерти великого князя Андрея Александровича Владимирского началась борьба между Москвой и Тверью за великое княжение. Сам Андрей завещал княжение Михаилу Ярославичу, но Юрий Даниилович также выдвинул свои силы. Поразмыслив, хан отдал ярлык московскому князю, который по праву именуется Великим."
 news.1054.a:0 "Это начало войны"

 news.1055.t:0 "§WМосковское Королевство!"
 news.1055.d:0 "Москва возвысилась за эти славные годы! Государство стало сильнее всех своих соседей, и по праву может называться королевством."
 news.1055.a:0 "Новая сила на карте"

 news.1056.t:0 "§WТверское Королевство!"
 news.1056.d:0 "Тверь возвысилась за эти славные годы! Государство стало сильнее всех своих соседей, и по праву может называться королевством."
 news.1056.a:0 "Новая сила на карте"

 news.1057.t:0 "§WНовгородское царство!"
 news.1057.d:0 "Новгород возвысился за эти славные годы! Государство стало сильнее всех своих соседей, и по праву может называться королевством."
 news.1057.a:0 "Новая сила на карте"

 news.1058.t:0 "§WСоюз Литвы с Тверью§!"
 news.1058.d:0 "Тверь, видя, что ее способность самостоятельно поддерживать проордынскую Москву, решила искать союзников в набиравшей силу Литве. После свадьбы княжеских детей был созван совет, на котором было решено, что мы получили два княжества в единый союз."
 news.1058.a:0 "Ну, если они захотят..."

 news.1059.t:0 "Кальтабеллоский договор"
 news.1059.d:0 "Согласно договору, островное королевство Сицилия разделяется на и полуостровную части. Островная часть переходит под власть Федериго II из Барселонской династии; полуостровная часть остается под властью Карла II из Анжуйской короны. После смерти Федериго Сицилия возвращает власть под Анжуйским домом. Федериго освобождает Филиппа, сына Карла, из провинции в Чефалу, а сам женится на дочери Карлы, Элеоноре."
 news.1059.a:0 "Очередная победа Федериго"

 news.1060.t:0 "Падение юаня"
 news.1060.d:0 "Из Китая приходят интересные новости. Монгольская династия Юань была свергнута, и власть снова перешла к китайцам, к династии Мин.
 news.1060.a:0 "Это конец монгольскому правлению??"
 