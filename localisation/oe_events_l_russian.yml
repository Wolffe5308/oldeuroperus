 hre.1.t:0 "§WБорьба за власть"
 hre.1.desc:0 "Уже много лет ведутся споры о том, кто должен стать императором Священной Римской Империи. На этот титул претендуют Альбрехт I (Австрия) И Вацлав II (Богемия). Спор достиг точки кипения. Начали формироваться противоборствующие блоки.
 hre.1.a:0 "Победа за нами!"
 hre.2.t:0 "§WПобеда за нами"
 hre.2.desc:0 "Уже много лет ведутся споры о том, кто должен стать императором Священной Римской Империи. На этот титул претендуют Альбрехт I (Австрия) И Вацлав II (Богемия). Спор достиг точки кипения. Начали формироваться противоборствующие блоки.
 hre.2.a:0 "Победа за нами!"
 hre.3.t:0 "§WБорьба за власть"
 hre.3.desc:0 "В течение многих лет велись споры о том, кто на самом деле должен быть императором Священной Римской Империи. Споры достигли точки кипения. Кого вы поддержите?"
 hre.3.a:0 "Богемия!"
 hre.3.b:0 "Австрия!"
 ven.1.t:0 "§WПредложение из Венеции"
 ven.1.desc:0 "Венецианская республика сделала вам предложение о продаже земли. Они готовы купить ее за 150 сундуков золота. Что мы скажем, милорд?"
 ven.1.a:0 "Мы принимаем."
 ven.1.b:0 "Какая наглость! Нет!"
 ven.2.t:0 "§WПокупка земли"
 ven.2.desc:0 "После долгих переговоров они согласились продать нам землю. Отличная сделка!"
 ven.2.a:0 "Отличный."
 ven.3.t:0 "§WПокупка земли"
 ven.3.desc:0 "После долгого торгового спора мы не смогли прийти к решению и только разозлили правителя."
 ven.3.a:0 "Печальный."
 gen.1.t:0 "§WПредложение из Венеции"
 gen.1.desc:0 "Венецианская республика сделала вам предложение о продаже земли. Они готовы купить ее за 150 сундуков золота. Что мы скажем, милорд?"
 gen.1.a:0 "Мы принимаем."
 gen.1.b:0 "Какая наглость! Нет!"
 gen.2.t:0 "§WПокупка земли"
 gen.2.desc:0 "После долгих переговоров они согласились продать нам землю. Отличная сделка!"
 gen.2.a:0 "Отличный."
 gen.3.t:0 "§WПокупка земли"
 gen.3.desc:0 "После долгого торгового спора мы не смогли прийти к решению и только разозлили правителя."
 gen.3.a:0 "Печально."
 hre.301.t:0 "§WБыл заключен Дрезденский пакт"
 hre.301.desc:0 "Сегодня Саксония инициировала создание Дрезденского пакта. Все страны, которые чувствуют угрозу со стороны Богемии, приглашаются в этот блок. По словам Иоанна II, этот союз станет серьезным препятствием на пути Богемии."
 hre.301.a:0 "Интересно."
 hre.300.t:0 "§WСаксония предлагает подписать пакт"
 hre.300.desc:0 "Саксония чувствует угрозу со стороны Богемии и заявляет, что Вацлав II претендует на большую часть немецких земель. Саксония предлагает объединиться в один военно-политический блок, чтобы противостоять восточному агрессору."
 hre.300.a:0 "Отличная идея!"
 hre.300.b:0 "Это все грязные сплетни. Отклоните предложение!"
 hre.400.t:0 "§WБогемная угроза"
 hre.400.desc:0 "По сведениям наших шпионов, Богемия готовит претензии на земли Саксонии, Померании и Бранденбурга. Многие при вашем дворе считают, что лучше заранее объединиться с предполагаемыми жертвами богемской агрессии."
 hre.400.a:0 "Посылать гонцов!"
 hre.400.b:0 "Все это грязная ложь!"
 
 tur.1.t:0 "§WОсманское вторжение"
 tur.1.desc:0 "Ходят слухи, что народы Центральной Азии объединились под знаменем могущественного полководца. Войска недавно возникшей империи уже движутся в центр нашей страны. К оружию!"
 tur.1.a:0 "Мы уничтожим их!"
 azt.1.t:0 "§WРелигиозный союз"
 azt.1.desc:0 "Ацтеки предлагают нам союз во славу наших народов. Это укрепит наш народ. Союз также поможет сохранить нашу религию и навязать ее нашим соседям."
 azt.1.a:0 "Заключите союз."
 azt.1.b:0 "Отвергните."
 azt.2.t:0 "§WМиссионеры науатля"
 azt.2.desc:0 "Миссионеры из земель ацтеков пришли на наши земли. Они говорят, что их религия лучше нашей, что Бог помогает им во всех их битвах. Может, нам стоит перейти на науатль?"
 azt.2.a:0 "Да."
 azt.2.b:0 "Нет."
 azt.3.t:0 "§WАцтеки предлагают союз"
 azt.3.desc:0 "Приняв религию ацтеков, мы можем присоединиться к их религиозному объединению, чтобы противостоять их соседям."
 azt.3.a:0 "Присоединяйтесь."
 azt.3.b:0 "Это не в наших интересах."
 azt.4.t:0 "§WРитуальное совокупление"
 azt.4.desc:0 "Мы можем провести древний ацтекский ритуал. Император ацтеков должен спариться с побежденным вождем (если они разного пола), демонстрируя свое превосходство над соперником. Это сильно унизит вражеского вождя. В день проведения ритуала проводятся многочисленные торжества и мероприятия."
 azt.4.a:0 "Давайте начнем..."
 azt.5.t:0 "§WПризнак болезни"
 azt.5.desc:0 "У нашего правителя начали проявляться различные признаки сифилиса. Вам нужно посоветоваться с целителями, чтобы сказать наверняка. Возможно, воображение?"
 azt.5.a:0 "Проведите необходимую беседу."
 azt.6.t:0 "§WЗатраханный до смерти"
 azt.6.desc:0 "Сегодня очень печальный день. Наша императрица умерла во время ритуала. Во время спаривания вождь задушил нашу правительницу. Вождь был очень жестким. Во время кульминации, от удовольствия, вождь не рассчитал силу и слишком сильно сжал ее горло. К сожалению, императрицу спасти не удалось, но предводитель был пойман и брошен в тюрьму."
 azt.6.a:0 "Трагедия!"
 azt.7.t:0 "§WВсего лишь случайность"
 azt.7.desc:0 "К сожалению, императрица не смогла справиться с болезнью. Боги с радостью примут ее на небесах."
 azt.7.a:0 "Болезнь забирает самых сильных..."
 hor.1.t:0 "§WОрда требует подарков!"
 hor.1.desc:0 "Мой господин, прибыли посланцы из Золотой Орды. Они говорят нам, что мы должны немедленно прислать людей или деньги в качестве дани, чтобы гарантировать наш суверенитет. Что мы им пошлем?"
 hor.1.a:0 "Наших лучших людей."
 hor.1.b:0 "Большую сумму денег."
 hor.1.c:0 "Гневный ответ."
 sam.1.t:0 "§WВыборы главы государства"
 sam.1.desc:0 "Политическая и экономическая жизнь нашего племени долгое время находилась в состоянии застоя. Нам пора решить, изменим ли мы курс при нашем лидере или выберем нового. За кого вы будете голосовать?"
 sam.1.a:0 "За Баэви!"
 sam.1.b:0 "За Анту!"
 sam.1.c:0 "За Лемпо!"
 sam.2.t:0 "§WВзаимные гарантии"
 sam.2.desc:0 "Недавно ко двору прибыли саамские дипломаты. Они от имени племени саами предлагают подписать соглашение о взаимопомощи. В случае войны мы будем обязаны вступиться за них, а они за нас."
 sam.2.a:0 "Соглашаться."
 sam.2.b:0 "Отрицать"
 sam.3.t:0 "§WПокупка Остроботнии"
 sam.3.desc:0 "Саамы прибыли сегодня ко двору с большой суммой денег. Они хотят купить у нас Остроботнию за 300 монет. Будет ли это выгодно для нас?"
 sam.3.a:0 "Соглашаться."
 sam.3.b:0 "Отрицать"
 oth.1.a:0 "Хорошая идея."
 oth.1.b:0 "Отрицать."
 oth.1.t:0 "§WТунгусский союз"
 oth.1.desc:0 "Тунгусы предлагают заключить Союз между нашими народами, тем самым укрепив связь наших народов. Этот союз послужит нашим общим целям!"
 oth.2.a:0 "Оо! Блестящий!"
 oth.2.b:0 "Что-то здесь не так...."
 oth.2.t:0 "§WПокупка Аляски"
 oth.2.desc:0 "К нам снова пришли чужеземцы из дальних стран. На этот раз их больше, и у них есть с собой что-то красивое и блестящее! Иностранцы хотят купить у нас землю, а взамен предлагают блестящие вещи. Последнее слово за тобой, великий вождь."
 news.1000.a:0 "Отлично!"
 news.1000.t:0 "§WОткрытие Америки"
 news.1000.d:0 "Сегодня знаменательный день! Долгие дни плавания не прошли даром. На рассвете моряки на борту экспедиционного судна "Тунгуска" увидели на горизонте новые территории. Новые земли оказались довольно суровыми. Пробираться через горы и густые леса очень трудно. Однако, несмотря на скудный ландшафт, земля богата полезными ископаемыми, что делает регион очень ценным. Исследователи также встретили местных жителей. У них необычная для нас красноватая кожа и темные волосы. Они встретили незнакомцев мирно и даже дали им приют на несколько ночей. Контакт с местными жителями может принести большую пользу в будущем."
 arr.1.t:0 "§WВосстание солдат!"
 arr.1.desc:0 "Мой Лорд, посыльный только что принес письмо от командира гарнизона крепости. В нем говорится, что солдаты в этом регионе взбунтовались из-за того, что мы надолго задержали их выплату. Пришло время собирать армию, потому что уже слишком поздно что-либо решать дипломатическим путем..."
 arr.1.a:0 "Пришло время собрать остатки армии..."
 oth.4.t:0 "§WВосстание мертвых"
 oth.4.desc:0 "Старый слепой волшебник бродил ночью по лесу и пролил на кладбище волшебный эликсир. И только и сказал: "Что я наделал?". Повсюду начали оживать трупы. От криков нежити сотрясались земля и деревья. С криками "Хой!" мертвецы двинулись к ближайшему городу. Эта новость из далекой страны взволновала умы нашего королевства. Что мы будем делать, ваше величество?"
 oth.4.a:0 "Я не знаю..."
 news.1001.t:0 "§WЛюксембург поклялся в верности!"
 news.1001.d:0 "Долгое время граф Люксембургский был в хороших отношениях с королем Франции Филиппом IV. Генрих родился во Франции и был другом короля. Филипп даже посвятил графа в рыцари. Теперь пришло время выполнить свои обязательства. Генрих VII теперь является вассалом Филиппа IV..."
 news.1001.a:0 "Неожиданно."
 hre.elections.t:0 "§WВыборы императора"
 hre.elections.desc:0 "Теперь пришло время выбрать нового императора Священной Римской Империи! Вам нужно тщательно обдумать свое решение. Будущее нашего региона может зависеть от нашего мнения. За какого лидера страны вы проголосуете, сэр?"
 hre.elections.a:0 "Люксембург."
 hre.elections.b:0 "Саксония."
 hre.elections.c:0 "Австрия."
 hre.elections.d:0 "Богемия."
 hre.elections.e:0 "Бавария."
 hre.elections.f:0 "Савоя."
 hre.elections.g:0 "Бранденбург."
 hre.elections.h:0 "Ломбардия."
 lux.1.t:0 "§WУспешные переговоры!"
 lux.1.desc:0 "Сегодня наши послы вернулись домой с Роны с хорошими новостями. Герцог согласился поддержать восстание в нужный момент. Пришло время завершить разработку нашего плана..."
 lux.1.a:0 "Отлично."
 lux.1b.t:0 "§WUnУспешные переговоры!"
 lux.1b.desc:0 "После долгих переговоров нам не удалось склонить вассала на свою сторону. Все эти доводы показались ему бессмыслицей. Что ж, мы можем обойтись и без них..."
 lux.1b.a:0 "Печально."
 lux.2.t:0 "§WУспешные переговоры!"
 lux.2.desc:0 "Сегодня наши послы вернулись домой из Пуату с хорошими новостями. Герцог согласился поддержать восстание в нужный момент. Пришло время завершить разработку нашего плана..."
 lux.2.a:0 "Отлично."
 lux.2b.t:0 "§WUnУспешные переговоры!"
 lux.2b.desc:0 "После долгих переговоров нам не удалось склонить вассала на свою сторону. Все эти доводы показались ему бессмыслицей. Что ж, мы можем обойтись и без них..."
 lux.2b.a:0 "Печально."
 lux.3.t:0 "§WУспешные переговоры!"
 lux.3.desc:0 "Сегодня наши послы вернулись домой из Бретани с хорошими новостями. Герцог согласился поддержать восстание в нужный момент. Пришло время завершить разработку нашего плана..."
 lux.3.a:0 "Отлично."
 lux.3b.t:0 "§WUnУспешные переговоры!"
 lux.3b.desc:0 "После долгих переговоров нам не удалось склонить вассала на свою сторону. Все эти доводы показались ему бессмыслицей. Что ж, мы можем обойтись и без них..."
 lux.3b.a:0 "Печально."
 lux.4.t:0 "§WЗатишье перед бурей!"
 lux.4.desc:0 "Ваше величество, у меня для вас плохие новости! Наши шпионы подслушали секретный разговор Генриха Люксембургского с некоторыми из наших вассалов. Они готовят план по разделению Франции и захвату власти! Уже слишком поздно, пора браться за оружие..."
 lux.4.a:0 "Затишье перед бурей!"
 product_plus1:0 "Будут созданы гильдии: §G20§!."
 product_plus2:0 "Будут созданы гильдии: §G100§!."
 pap.1.t:0 "§WУльтиматум"
 pap.1.desc:0 "Сегодня из "Лацио" пришло письмо с ультиматумом. Они требуют нашего добровольного участия. Если мы откажемся, они угрожают отобрать землю силой. Что мы должны сказать?"
 pap.1.a:0 "Мы встанем на колени..."
 pap.1.b:0 "Это война!"
 pap.2.t:0 "§WПокупка земли"
 pap.2.desc:0 "Правитель Лацио предлагает крупную сумму денег за нашу землю. 500 золотых монет."
 pap.2.a:0 "Выгодное предложение."
 pap.2.b:0 "Они думают, что мы глупые?"
 news.1002.t:0 "§WДревний ритуал"
 news.1002.d:0 "Во время древнего традиционного африканского ритуала знакомства вождю инков разорвали рот."
 news.1002.a:0 "Отлично!"
 
 fra.3.t:0 "§WПрисоединение Наварры"
 fra.3.desc:0 "Основываясь на родственных связях наших правителей, французский король Филипп IV требует аннексии!"
 fra.3.a:0 "Выгодное предложение."
 fra.3.b:0 "Собери армию!"
 
 fra.4.t:0 "§WОтказ!"
 fra.4.desc:0 "Наварра бурно отреагировала на наше требование. Они отрубили голову нашему послу и готовятся защищаться."
 fra.4.a:0 "Наглый жук!"
 
 lif.1.t:0 "§WКомета"
 lif.1.desc:0 "Обычные люди всегда падают, когда продвигают кометы волнующие или затмение. Это видит смятение и пугает людей в нашей стране."
 lif.1.a:0 "Это знак свыше!"
 lif.1.b:0 "Конец близок..."
 lif.1.c:0 "Это просто космическое тело."
 lif.1.d:0 "Это не Хорошо..."

 lif.2.t:0 "§WМастерская"
 lif.2.desc:0 "В один прекрасный день ремесленник вернулся с рынка в свою мастерскую, как вдруг заметил вдалеке дым. Подойдя ближе, он понял, что горит его мастерская. Он подозревает, что это сделал сосед, но доказательств нет. Мастер обратился за помощью лично к вам, рассчитывая на вашу щедрость. Что вы собираетесь делать, мой Лорд?"
 lif.2.a:0 "Подготовить для него новую мастерскую."
 lif.2.b:0 "Мы ничем не можем помочь."
 
 lif.3.t:0 "§WКрепость"
 lif.3.desc:0 "На окраине графства есть заброшенная крепость. На протяжении многих лет из-за этого сооружения шли споры и стычки. Духовенство считает, что здесь должен быть монастырь, но местный владыка думает иначе. Пришло время разрешить этот спор."
 lif.3.a:0 "Крепость — это военное сооружение."
 lif.3.b:0 "Монастырь звучит более убедительно."

 lif.4.t:0 "§WСокровище"
 lif.4.desc:0 "Патрулирующие войска наткнулись в лесу на древнюю сокровищницу. Даже при входе в здание можно было увидеть блеск хранящегося здесь золота. Что нам делать с сокровищами?"
 lif.4.b:0 "Это наша собственность!"
 lif.4.a:0 "Мы устроим большой пир в замке и пригласим всех из окрестностей."

 lif.5.t:0 "§WОхота на ведьм"
 lif.5.desc:0 "Долгое время местные жители жаловались на постоянные крики в конце и даже говорили о вампирах. Люди просят вас плотную прилегающую территорию."
 lif.5.a:0 "Создать патрули."
 lif.5.b:0 "Это просто сказки."

 lif.6.t:0 "§WОдинокая ночь"
 lif.6.desc:0 "Ваша дочь уже достаточно взрослая, чтобы иметь детей. Ей пора выйти замуж, но она помешана на крестьянине и говорит, что любит его. Вы, как ее родитель и правитель нашей страны, можете решить проблему самостоятельно."
 lif.6.a:0 "Выдайте ее замуж за могущественного вассала."
 lif.6.b:0 "Сын-священник — хороший выбор."
 lif.6.c:0 "Пусть решает ее любовь."
 
 lif.7.t:0 "§WСудебный процесс над торговцем"
 lif.7.desc:0 "Множество людей сообщали о кражах и бандитизме в городе. Многие жертвы, что за это стоит влиятельный еврейский торговец, и однажды догадки подтвердились. Вам нужно решить, что делать с незваным гостем."
 lif.7.a:0 "Конфисковать его мастерскую."
 lif.7.b:0 "Требуйте большую сумму денег."
 lif.7.c:0 "Отпусти его, его подставили..."

 lif.8.t:0 "§WГолод"
 lif.8.desc:0 "В одной из провинций нашего государства начался голод, который длится уже больше месяца. Крестьяне обращаются к вам с просьбой о помощи. У нас в королевском хлеву осталось много свиней..."
 lif.8.a:0 "Отдайте им свиней, а Бэйба оставьте с нами."
 lif.8.b:0 "Мы ничем не можем помочь..."

 lif.9.t:0 "§WСкандал с наследником"
 lif.9.desc:0 "Ваш наследник стал закрывать насмешек и слухов, так как стал подозрительно часто ходить в баню со своим вооружением..."
 lif.9.a:0 "Ой, сынок..."

 lif.10.t:0 "§WУжасная погода"
 lif.10.desc:0 "В одном из наших регионов стоит аномальная погода, люди не могут продуктивно работать и торговать."
 lif.10.a:0 "Стройте укрытия от непогоды."
 lif.10.b:0 "Это их проблемы."
 
 lif.11.t:0 "§WСтранствующие рыцари"
 lif.11.desc:0 "Недавно в наше Королевство прибыла довольно большая группа рыцарей-наемников. Они предлагают свои услуги любому лорду или правителю. Считаете ли вы необходимым нанять их?"
 lif.11.a:0 "Они окажутся полезными."
 lif.11.b:0 "Пусть они уходят."
 
 lif.12.t:0 "§WСкандал с женой"
 lif.12.desc:0 "Недавно вашу жену заметили одну в компании пьяных торговцев из далекой Африки, и теперь об этом говорит вся страна."
 lif.12.a:0 "И без меня!?"
 
 lif.13.t:0 "§WРыбная ловля"
 lif.13.desc:0 "На большом озере есть одно место, где водится много рыбы. Поскольку участок является частью земель влиятельного дворянина, он имеет право никого туда не пускать. Для знати там ловят много видов рыбы. Бедные рыбаки из окрестных земель просят вас сделать этот участок общим или отдать его им в пользование."
 lif.13.a:0 "Это общая земля."
 lif.13.b:0 "Отдай это рыбакам."
 lif.13.c:0 "Озеро - собственность Лорда!"
 
 lif.14.t:0 "§WОтличный турнир"
 lif.14.desc:0 "Проведение турнира может повысить ваш авторитет в глазах людей, а также позволит вам с пользой провести время. Хотели бы вы провести масштабный турнир в нашей замке?"
 lif.14.a:0 "Хорошая идея."
 lif.14.b:0 "Без турнира обойдутся."

 lif.16.t:0 "§WНедостаток соли!"
 lif.16.desc:0 "Невозможно представить себе более простой и быстрый ресурс для обычного крестьянина, чем соль. С ее помощью он консервирует овощи, употребляет в пищу, а также солит рыбу и мясо. Вы даже представить себе это не можете, что произойдет, если у нас вдруг исчезнет соль... И вам не нужно возвышение, обоз с солью был огрален грабителями, теперь нам нужно как-то решить проблему."
 lif.16.a:0 "Это не моя проблема."
 lif.16.b:0 "Купить соль у соседей."

 lif.17.t:0 "§WНовости из далёких земель!"
 lif.17.desc:0 "Издалека приходит вести о том, что через нашу землю проходит большой торговый обоз. Некоторые люди хотят заработать на купцах, хороших продуктах и ​​продуктах, но есть и я, кто, вероятно, хотел бы ограбить богатых купцов."
 lif.17.a:0 "Пусть мирно торгуют."
 lif.17.b:0 "Надо торговцев грабить, деньги нужны."

 lif.18.t:0 "§WПоследствия"
 lif.18.desc:0 "После нашего дерзкого ограничения торговой конвоя у нас возникли проблемы. Караваны влиятельного купца, который служил непосредственно правителем соседнего государства. Монарх был в ярости, когда выслушал жертву. Теперь в любой момент может начаться военный."
 lif.18.a:0 "Черт возьми."

 lif.19.t:0 "§WНаш конвой ограбили!"
 lif.19.desc:0 "Пару дней назад у вас состоялась встреча с влиятельным торговцем, который вам служит. Он говорит, что его торговый обоз с ценными товарами был ограничен по дороге. Понятно, что обычное дело, но ваше мнение изменилось, когда вы услышали, что конвой был ограблен войсками соседней страны, а не бандитами. Теперь у нас есть официальная причина войны!"
 lif.19.a:0 "Мы отомстим...»
 
 lif.20.t:0 "Покупка §WLang"
 lif.20.desc:0 "Очень влиятельный и богатый предлагает ход. За крупную сумму денег он хочет купить один из наших регионов. Регион де-факто станет независимой Западной, но этот человек станет вашим человеком, так что вы не потеряете полный контроль над землей."
 lif.20.a:0 "Я согласен."
 lif.20.b:0 "Как он посмел!"

 lif.21.t:0 "§WНехватка сырья"
 lif.21.desc:0 "В настоящее время наблюдается нехватка требований для производства оружия частными мастерскими. Это связано с тем, что цены на товары могут значительно вырасти. Мы снижаем налоги для граждан, тем самым обеспечивая максимальную покупательную способность."
 lif.21.a:0 "Снизьте налоги!"
 lif.21.b:0 "Мы ничего не можем сделать."

 lif.22.t:0 "§WДобыча полезных ископаемых"
 lif.22.desc:0 "В одной из наших провинций обрушилась шахта. В ней находилось много рабочих. Когда люди разбирали завалы, они обнаружили мертвых шахтеров. Им не хватает кислорода. Предположительно, люди смогли прожить там всего несколько часов."
 lif.22.a:0 "Помолимся!"
 lif.22.b:0 "Выплатить компенсацию семьям погибших."

 lif.23.t:0 "§WДобыча полезных ископаемых"
 lif.23.desc:0 "Группа шахтеров просит вас оказать поддержку в разработке новых мест рождения железа. По их мнению, если вы хорошо разведаете местность, то сможете найти жилу."
 lif.23.a:0 "Поддержите майнеров."
 if.23.b:0 "Отказать."

 lif.24.t:0 "§WМастера-ткачи"
 lif.24.desc:0 "Несколько человек решили открыть в нашей столице собственную ткацкую мастерскую. Это принесло результаты. Ткань получается очень качественная и дорогая."
 lif.24.a:0 "Отлично!"

 lif.25.t:0 "§WЗолотая жила!"
 lif.25.desc:0 "Во время разведки в этом районе люди обнаружили довольно крупное месторождение золота! Этот ресурс, в конечном итоге, служит нашему благосостоянию."
 lif.25.a:0 "Мы богаты!"

 lif.26.t:0 "§WСтроительство замков"
 lif.26.desc:0 "Ваше величие, как вы знаете, вокруг нас много враждебных стран. Мы можем построить множество укреплений в столичном регионе, чтобы быть готовыми ко всему миру."
 lif.26.a:0 "Оно того стоит."
 lif.26.b:0 "Слишком Дорогой."
 
 lif.27.t:0 "§WКоррупция"
 lif.27.desc:0 "Из-за слабой поддержки среди знати и горожан уровень коррупции растет. Люди воруют все чаще и чаще."
 lif.27.a:0 "Такую страну разграбили..."

 lif.28.t:0 "§WПекарня"
 lif.28.desc:0 "В городе есть необычная пекарня. Некоторое время назад люди, которые покупали пирожки в этом заведении, отравились. Все началось с того, что пекарь придумал новую начинку "Горячий соус" собственного производства. Вроде бы ничего необычного, но котлеты подозрительно пахнут, и это очень странно..."
 lif.28.a:0 "Опять херню продаёт..."
 lif.28.b:0 "Пусть продает."
 
 lif.29.t:0 "§WОграбление банка!"
 lif.29.desc:0 "Банк, куда вы положили свои деньги, был ограблен, а все сотрудники убиты. Разумеется, никто не возместит ущерб. Все деньги, которые хранились в банке, исчезли, в том числе и ваши."
 lif.29.a:0 "Черт..."
 
 lif.30.t:0 "§WХороший мальчик"
 lif.30.desc:0 "Люди вас очень любят, и этот мальчик не исключение. Он очень благодарен вам за то, что у него есть все, и в знак благодарности положил все свои сбережения в банк на ваше имя. Большой поступок маленького человека!"
 lif.30.a:0 "Как мило!"
 lif.30.b:0 "Дайте ему в 2 раза больше!"
 
 lif.31.t:0 "§WПереселение"
 lif.31.desc:0 "Совокупность факторов побуждает многих людей мигрировать со старых земель. В одном регионе наблюдался большой приток новых людей."
 lif.31.a:0 "Неплохо."
 
 lif.32.t:0 "§WРост города!"
 lif.32.desc:0 "Во многих регионах стремительно развиваются ремесла, растут города и увеличивается приток населения. Это положительно сказывается на росте населения и экономики."
 lif.32.a:0 "Неплохо."
 
 lif.33.t:0 "§WВооруженные крестьяне!"
 lif.33.desc:0 "Идет оборонительная война, которая проходит не слишком гладко. Люди любят вас и решили помочь. Крестьяне за свой счет сформировали в столице небольшой полк ополчения. Они ждут ваших приказов."
 lif.33.a:0 "Подарок судьбы."
 
 lif.34.t:0 "§WОпытные консультанты"
 lif.34.desc:0 "За годы вашего правления советники приобрели большой опыт. Теперь, благодаря хорошим менеджерам, вы можете более эффективно управлять большими территориями."
 lif.34.a:0 "Best advisors!"
 
 lif.35.t:0 "§WАлкоголизм"
 lif.35.desc:0 "Милорд, ваши советники и приближенные ежедневно устраивают пиры, лишь изредка выполняя приказы. В результате у нас некомпетентные менеджеры, что, несомненно, повлияет на нашу способность управлять страной."
 lif.35.a:0 "Проклятые бездельники!"
 
 lif.36.t:0 "§WДеньги, потраченные на выпивку"
 lif.36.desc:0 "Месяц назад вы поручили одному, казалось бы, важному человеку построить храм в одной из ваших многочисленных провинций. Время пролетело незаметно, и, как это обычно бывает, этот человек исчез вместе с вашими деньгами. Однажды, возвращаясь из соседней провинции, вы решили зайти в таверну, чтобы поесть и отдохнуть. Вы зашли и увидели следующую картину: человек, которому вы доверили строительство, был настолько пьян, что принял вас за куртизанку. Слева играл бард, заканчивая куплетом "Один плюс один плюс три равно пяти, мы потратили все деньги на выпивку, Тони...", музыка перестала играть, когда все увидели тебя. Хозяин таверны сделал самый серьезный вид, а остальные посетители продолжали пить. Когда вы подошли к пьяному строителю, его взгляд изменился, и он понял, что вы король. Вы несколько раз спрашивали его о деньгах, но каждый раз он отвечал, что не знает, где они. И тогда вам все стало ясно: он потратил их все на выпивку. Вы немедленно приказали повесить предателя, но деньги вернуть невозможно. Мораль этой истории такова - ..."
 lif.36.a:0 "...вокруг одни предатели!"
 lif.36.b:0 "...во всем виноват алкоголь!"
 lif.36.c:0 "...люди - свиньи!"
 lif.36.d:0 "...принеси мне немного виноградной лозы!"
 
 lif.37.t:0 "§WСокровище"
 lif.37.desc:0 "Ваше величество, мы занимались строительными работами в одной из ваших провинций. Пришло время строить подвал. После нескольких часов активной работы наши рабочие наткнулись на древнюю сокровищницу, полную золота. Что делать с богатством?"
 lif.37.a:0 "Это все мое.!"
 lif.37.b:0 "Мы поделимся этим с людьми."
 
 lif.38.t:0 "§WМиграция"
 lif.38.desc:0 "Ряд событий в соседних странах привел к волне миграции на наши земли."
 lif.38.a:0 "Хорошие новости!"
 
 lif.39.t:0 "§WАдминистрация"
 lif.39.desc:0 "Многие из наших вассалов не могут эффективно управлять своими территориями, что приводит к разногласиям, крестьянским протестам и сепаратистским движениям."
 lif.39.a:0 "Чёрт побери!"
 
 lif.40.t:0 "§WОпытные командиры"
 lif.40.desc:0 "Масштабная подготовка наших командиров принесла свои плоды..."
 lif.40.a:0 "Командир делает успехи."
 lif.40.b:0 "Развитие навыков подбора персонала."
 
 lif.41.t:0 "§WСтранствующий феодал"
 lif.41.desc:0 "К вам прибыл обедневший дворянин из далекой страны. Его карьера там закончилась катастрофой, и он чудом выжил. Леопольд поклялся вам в верности и готов возглавить армию. Его навыки помогут нам стать великими!"
 lif.41.a:0 "Хорошо."
 
 lif.42.t:0 "§WВолнения в народе"
 lif.42.desc:0 "Фермеры и горожане недовольны поведением феодалов и местной администрации. Иногда это приводит к стычкам и беспорядкам!"
 lif.42.a:0 "Черт возьми."
 
 lif.43.t:0 "§WСбежавшие свиньи"
 lif.43.desc:0 "Сегодня в городе были обнаружены ничейные свиньи. Казалось бы, ничего необычного, но один фермер утверждает, что это его свиньи и они сбежали, пока он спал. Что вы будете делать?"
 lif.43.a:0 "Они мои!"
 lif.43.b:0 "Верните их крестьянам."
 
 lif.44.t:0 "§WОгонь"
 lif.44.desc:0 "В столице произошел масштабный пожар. Большинство деревянных зданий сгорело, осталось лишь несколько каменных. Нам нужно восстановить город любой ценой, сколько бы это ни стоило..."
 lif.44.a:0 "У нас совсем нет денег..."
 lif.44.b:0 "Этого должно быть достаточно."
 
 lif.45.t:0 "§WНаводнение"
 lif.45.desc:0 "Один из наших регионов подвергся гневу богов! Некоторые поселения, расположенные на побережье, были смыты огромными волнами."
 lif.45.a:0 "Черт возьми!"
 
 lif.46.t:0 "§WЦирк"
 lif.46.desc:0 "Милорд, у нас в стране давно не было праздников. Как насчет того, чтобы пригласить в столицу цирк и повеселить народ?"
 lif.46.a:0 "Они хотят слишком многого."
 lif.46.b:0 "Иногда каждому нужна доза веселья!"
 
 lif.47.t:0 "§WКузнец"
 lif.47.desc:0 "Сэр, к вам пришел один из наших придворных кузнецов и просит дать ему немного денег на эксперименты с нашим оружием. По его словам, если у него все получится, наши мечи смогут без проблем рубить деревья!"
 lif.47.a:0 "Вы наняты!"
 lif.47.b:0 "Звучит подозрительно..."
 
 lif.48.t:0 "§WГосподин"
 lif.48.desc:0 "В одном из наших регионов лорда обвиняют в том, что он слишком жесток к людям! Что нам с ним делать?"
 lif.48.a:0 "Накажи господа и выплати компенсацию."
 lif.48.b:0 "Накажи господа."
 lif.48.c:0 "Игнорировать."
 
 lif.49.t:0 "§WАристократ"
 lif.49.desc:0 "Милорд, у нас проблема! У вашего доверенного лица недавно был юбилей, и он отпраздновал его публично и пышно! Население недовольно, поскольку совпали несколько фактов. Во-первых, его официальная зарплата невелика, а во-вторых, деньги, выделенные на премии отличившимся рабочим и солдатам, "внезапно" исчезли!"
 lif.49.a:0 "Мои советники имеют право быть репрезентативными!"
 lif.49.b:0 "Бонусы будут выплачены, а советник будет уволен!"
 
 lif.50.t:0 "§WМинералы"
 lif.50.desc:0 "Милорд, отличные новости! Подыскивая место для винного склада, мы наткнулись на залежи полезных ископаемых. Я уверен, что мы сможем продать их по хорошей цене!"
 lif.50.a:0 "Продай их дворянам, они хорошо заплатят!"
 lif.50.b:0 "Я с простыми людьми!"
 
 lif.51.t:0 "§WКниги"
 lif.51.desc:0 "Милорд, у нашего казначея есть идея заработать денег! Соберите много путешественников и отправляйте их в разные уголки мира, чтобы они приносили информацию обо всем, что видели! А затем создайте много таких "сочинений о мире" и продавайте их за хорошую цену!"
 lif.51.a:0 "Хорошая идея!"
 lif.51.b:0 "Слишком авантюрно!"
 
 lif.52.t:0 "§WЛошадь"
 lif.52.desc:0 "Милорд, ваша лошадь умерла от старости, и, чтобы поддержать ваш престиж, я предлагаю вам купить новую."
 lif.52.a:0 "Найди самую лучшую лошадь!"
 lif.52.b:0 "Достаточно простого."
 lif.52.c:0 "Я выберу самый дешевый вариант."
 
 lif.53.t:0 "§WОбедневший ремесленник."
 lif.53.desc:0 "Милорд, прибыл руководитель частной мастерской, у которого полностью закончились расходные материалы, оборудование и деньги! Продукция мастерской пользуется большой популярностью у людей! Он просит у нас денег в обмен на свою лояльность и свою мастерскую!"
 lif.53.a:0 "Мы должны поддержать его."
 lif.53.b:0 "Это его проблемы!"
 
 lif.54.t:0 "§WКрестьяне"
 lif.54.desc:0 "Милорд, главные площади нашей столицы заполнены голодающими крестьянами. Они требуют хлеба и отставки министров-казнокрадов."
 lif.54.a:0 "Люди всегда правы!"
 lif.54.b:0 "Как этот сброд вообще осмеливается говорить подобные вещи?!"
 
 lif.55.t:0 "§WДом в городе"
 lif.55.desc:0 "Милорд, в округе, расположенном недалеко от столицы, долгое время стоял большой дом. Его хотят приобрести как дворяне, которые хотят превратить его в элитный дом отдыха для богатых, так и фермеры, которые хотят создать там музей охотничьих трофеев. Дворяне готовы платить деньгами, а крестьяне могут только обещать бесплатный вход для всех."
 lif.55.a:0 "Продай дом знати!"
 lif.55.b:0 "Простым людям это нужно больше."
 lif.55.c:0 "Этот дом не продается."
 
 lif.56.t:0 "§WТабун лошадей"
 lif.56.desc:0 "Милорд, недавно у знати украли табун дорогих лошадей! Они требуют от нас компенсации, потому что считают, что это произошло из-за недостаточной безопасности! Каков ваш ответ?"
 lif.56.a:0 "Какая наглость!"
 lif.56.b:0 "Да будет так."
 
 lif.57.t:0 "§WГерой"
 lif.57.desc:0 "Милорд, местные бандиты совершили налет на одну из наших деревень. В банде было около 30 человек. Население деревни быстро разбежалось по домам, но навстречу грабителям вышел храбрый молодой человек с мечом. Никто из жителей деревни не осмелился помочь, потому что они подумали, что он сошел с ума. Однако герой храбро сражался и, неожиданно для всех, выиграл битву. Мы должны наградить его."
 lif.57.a:0 "Возьмите его к нам на службу."
 lif.57.b:0 "Пошлите ему мешок с золотом."
 lif.57.c:0 "Он должен быть моим личным охранником!"
 
 lif.58.t:0 "§WДобыча"
 lif.58.desc:0 "Милорд, в лесу было найдено стадо коров. Поблизости никого не было, и мы решили их убить. Там было много мяса и шкур, и мы не знали, как их разделить."
 lif.58.a:0 "Отдайте их крестьянам."
 lif.58.b:0 "Продавайте их горожанам и ремесленникам."
 lif.58.c:0 "Это все мое.!"
 
 lif.59.t:0 "§WШелк"
 lif.59.desc:0 "К нам пришли торговцы! Они хотят продать нам дорогие шелка и ткани! Они достаточно качественные и могут нам пригодиться."
 lif.59.a:0 "Хм... Я согласен."
 lif.59.b:0 "Пустая трата денег."
 
 lif.60.t:0 "§WГолод"
 lif.60.desc:0 "Ваше высочество, в этом году был неурожай, и нашим людям почти нечего есть! Мы можем купить продукты, но это будет довольно дорого..."
 lif.60.a:0 "Нам придется."
 lif.60.b:0 "Ах, в этом нет ничего особенного."
 
 lif.61.t:0 "§WМануфактуры"
 lif.61.desc:0 "Переход к промышленному производству оказал положительное влияние на открытие новых предприятий. В последнее время многие ремесленники организовали свои гильдии."
 lif.61.a:0 "Отлично."
 
 lif.62.t:0 "§WПроизводство"
 lif.62.desc:0 "В нашей стране появляется все больше и больше заводов, что положительно сказывается на экономике!"
 lif.62.a:0 "Потрясающе."
 
 lif.63.t:0 "§WПроизводство оружия"
 lif.63.desc:0 "На мануфактурах стало эффективно производить не только простые вещи, но и детали для оружия. Например, одна мануфактура может заниматься гардами, другая - рукоятями, а третья - лезвиями мечей. Таким образом, можно прийти к единому стандарту производства определенных видов оружия. Это приводит к открытию все большего числа производственных цехов."
 lif.63.a:0 "Качественное оружие? Хорошо."
 
 lif.64.t:0 "Спокойной ночи, приключения!"
 lif.64.desc:0 "Ваш разгульный и богохульный образ жизни привел к рождению ребенка. Неизвестно, сколько еще потенциальных бастардов может появиться на свет, но у вас есть выбор. Узаконить ребенка или отказаться от него?"
 lif.64.a:0 "Узаконивай, это моя кровь".
 lif.64.b:0 "Избавься от него прямо сейчас!"
 
 lif.65.t:0 "§WСтрасть?"
 lif.65.desc:0 "Одна из ваших служанок часто смотрит на вас, и вам кажется, что она в вас влюблена. Проходя по коридору мимо комнат для прислуги, вы остановились перед дверью. Вы услышали шорох и поняли, что она в комнате. Что мне делать? Я знаю, что она, как и я, хочет предаться плотским утехам, но правильно ли это делать?"
 lif.65.a:0 "Я могу все..."
 lif.65.b:0 "Это грех".
 
 lif.66.t:0 "§WОружие"
 lif.66.desc:0 "В последнее время соседние страны вложили значительные средства в развитие своей армии. Нам тоже нужно это делать, если мы не хотим пасть под натиском врага."
 lif.66.a:0 "Мы ничуть не хуже!"
 lif.66.b:0 "Денег нет".
 
 lif.67.t:0 "§WГрязные слухи"
 lif.67.desc:0 "О вас и вашей семье в нашей стране идут нелепые слухи. Говорят, что вы заодно с одним из полевых командиров... Впрочем, вам это будет неинтересно. К сожалению, поймать распространителей этих слухов невозможно - если посадить их всех, некому будет их защищать."
 lif.67.a:0 "Как они посмели?!"

 lif.68.t:0 "§WУжасные солдаты"
 lif.68.desc:0 "В одном из наших городов напала банда бандитов. Двое жителей города предложили свой план производства из этой напасти. Отчаявшиеся горожане придерживаются своего плана. В результате это к частичному разрушению города и потере городских казней. Сейчас эти воины ждут честного народного суда, но мы можем повлиять на его решение. Что нам делать?"
 lif.68.a:0 "Ничего не делать."
 lif.68.b:0 "Отправьте их на работу."
 lif.68.c:0 "Посадите их на кол!"

 lif.69.t:0 "§WТорговля"
 lif.69.desc:0 "Торговля переживает лучшие времена. Мы должны воспользоваться этим!"
 lif.69.a:0 "Я богат!"
 lif.69.b:0 "Мы богаты!"

 lif.70.t:0 "§WЗдание"
 lif.70.desc:0 "Благодаря прибыльной торговле и производству в регионах развивается инфраструктура. Граждане сами строят дороги, общественные здания и т.д."
 lif.70.a:0 "Отлично."

 lif.71.t:0 "§WПретензии"
 lif.71.desc:0 "Перед нами выгодная ситуация. Недавние пограничные споры стали поводом для предъявления исков. Если вы прикажете, мы сможем юридически обосновать наше право на новую землю."
 lif.71.a:0 "Претензии - это хорошо."
 lif.71.b:0 "Это того не стоит."

 lif.72.t:0 "§WБандиты"
 lif.72.desc:0 "В окрестных лесах много бандитов. Они грабят караваны с продовольствием и оружием, нападают на небольшую деревню и пассажира. Разбойники очень сильно бьют по экономике региона и благосостоянию людей. Если мы ничего не предпримем, это может обернуться чем-то ужасным!"
 lif.72.a:0 "Отправьте войска!"
 lif.72.b:0 "Кто-нибудь видел бандитов?"

 lif.73.t:0 "§WПолководцы из далеких земель"
 lif.73.desc:0 "У нас есть уникальная возможность взять в отделение некоторых военачальников из стран. Конечно, это требует определенных вложений, но наши войска выходят на новый уровень тактики."
 lif.73.a:0 "Стоит каждого пенни."
 lif.73.b:0 "Рано тратить деньги."

 lif.74.t:0 "§WДраки"
 lif.74.desc:0 "В последнее время жители нашли себе развлечение - каждую неделю они устраивают драки за городом, в которых жертвы не редкость. С каждым днем ​​участников этих массовых убийств становится все больше! Должны ли мы иметь какое-то поведение?"
 lif.74.a:0 "Драка? И без меня?!"
 lif.74.b:0 "Посадите организаторов!"
 lif.74.c:0 "Пусть повеселятся."

 lif.75.t:0 "§WЭпическая поэма"
 lif.75.desc:0 "К нам обратился один человек с вниманием к помощи в написании эпических поэм. Он оказал должное внимание нашему народу, и это будет для нас очень полезно."
 lif.75.a:0 "Почему бы и нет?"
 lif.75.b:0 "Не интересно."
 
 lif.76.t:0 "§WИспуганный дворянин"
 lif.76.desc:0 "Некий дворянин попросил аудиенции, на которой рассказал об ужасном видении, в котором он был убит опасным грабителем. Он казался действительно обеспокоенным этим. Он предлагает все свое богатство в обмен на защиту."
 lif.76.a:0 "Да будет так."
 lif.76.b:0 "Он что, сумасшедший?"
 
 lif.77.t:0 "§WПопытка подкупа"
 lif.77.desc:0 "Один дворянин предложил нам много денег в обмен на небольшую услугу. Он хочет занять место в высшем правящем кругу страны. В противном случае он обещает оклеветать нас и нашу семью."
 lif.77.a:0 "Это возмутительно!"
 lif.77.b:0 "Мы заключим сделку..."
 
 lif.78.t:0 "§WДрузья, преодолевающие границы"
 lif.78.desc:0 "Мы можем использовать нашу сеть знакомств на благо нашей страны, улучшая отношения с другими державами. Нам просто нужно сделать щедрый подарок нужному человеку..."
 lif.78.a:0 "От этого трудно отказаться..."
 lif.78.b:0 "В политике нет такого слова, как "дружба"."
 
 lif.79.t:0 "§WОтношение к войне"
 lif.79.desc:0 "В стране наблюдается снижение популярности военной службы. Молодые люди просто не хотят служить в армии. Необходимо что-то предпринять, чтобы остановить развитие этой тенденции."
 lif.79.a:0 "Трусы!"
 
 lif.80.t:0 "§WВойна как смысл жизни"
 lif.80.desc:0 "Нашу страну охватил резкий подъем патриотизма. Любой молодой человек сейчас мечтает о великих сражениях и славе. Будем надеяться, что эта тенденция сохранится надолго."
 lif.80.a:0 "Мы можем это использовать."
 
 lif.81.t:0 "§WРаботорговля"
 lif.81.desc:0 "Использование рабов - чрезвычайно прибыльный бизнес. Пару дней назад в наши края прибыли работорговцы. Мы можем купить большую партию рабов, но это будет дорого стоить."
 lif.81.a:0 "Покупка окупится."
 lif.81.b:0 "Нам не нужны рабы."
 
 lif.82.t:0 "§WНизкая стабильность"
 lif.82.desc:0 "Из-за низкого уровня стабильности торговцы вместе со своими ремесленниками начали активно покидать нашу страну, опасаясь за свое имущество. Бизнес-среда стала очень непредсказуемой. Нам нужно что-то делать..."
 lif.82.a:0 "Проклятье!"
 
 lif.83.t:0 "§WИностранный советник"
 lif.83.desc:0 "К нам пришел иностранный советник и предложил свои услуги в управлении государством. Его знания могут быть нам полезны."
 lif.83.a:0 "Рентабельный."
 lif.83.b:0 "Дорогой."
 
 lif.84.t:0 "§WЦерковные наделы"
 lif.84.desc:0 "Мы столкнулись с большой проблемой. У Церкви слишком большое влияние и слишком много земельных участков, которые могли бы нам пригодиться. Мы можем конфисковать эти земли, но столкнемся с сопротивлением людей. Что мы будем делать?"
 lif.84.a:0 "Эти земли принадлежат мне!"
 lif.84.b:0 "Они больше нуждаются в этих землях."
 
 lif.85.t:0 "§WКарты"
 lif.85.desc:0 "Милорд, мы можем поручить картографам создать более качественные карты нашей страны. Это значительно облегчит нам управление страной."
 lif.85.a:0 "Сделаем это."
 lif.85.b:0 "Мне нравятся старые."
 
 lif.86.t:0 "§WПредатель!"
 lif.86.desc:0 "Это возмутительно! Один из наших советников пытался сбежать в соседнюю страну, но ему это не удалось - наши патрули задержали его недалеко от границы. Сейчас он находится в темнице, ожидая своей участи. Народ требует его казни, но он предлагает нам все свое золото в обмен на свою жизнь. Выбор за вами..."
 lif.86.a:0 "Нам не нужно ваше золото..."
 lif.86.b:0 "Золото - это хорошо, а больше золота - еще лучше..."
 
 lif.87.t:0 "§WОфициальный бандит"
 lif.87.desc:0 "В нашей стране есть один печально известный чиновник. Мы решили разузнать кое-что об этом человеке. После многочисленных интервью нам удалось выяснить, что в первые годы он неоднократно совершал грабежи, сопровождавшиеся тяжелыми травмами фермеров. Мы считаем, что такой человек недостоин находиться при дворе."
 lif.87.a:0 "Джерара здесь!"
 lif.87.b:0 "Он нам нужен."
 
 lif.88.t:0 "§WУличная политика"
 lif.88.desc:0 "\"Да, грядет диктатура. И это объясняется монетарными факторами. Наше правительство выбрало курс на укрепление рынка. Какое укрепление? Узкая группа правящих чиновников забирает всю собственность, а народ обнищал. В результате нам нужна армия, нам нужна диктатура. Все просто. Они выбрали самый жалкий, самый отвратительный и самый ненужный для нас путь, понимаете?" - со слов гражданина.."
 lif.88.a:0 "Заставляет задуматься."
 
 lif.89.t:0 "§WПлодотворный год"
 lif.89.desc:0 "В этом году наши поля собрали очень хороший урожай, настолько хороший, что амбары заполнены до краев. Что вы хотите, чтобы я сделал с товарами?"
 lif.89.a:0 "Раздайте бедным!"
 lif.89.b:0 "Продайте соседям."
 lif.89.c:0 "Организуйте грандиозный банкет!"
 
 lif.90.t:0 "§WГолод"
 lif.90.desc:0 "Люди, восставшие против своих хозяев, начали жечь усадьбы и амбары, где хранилась еда. Но они забыли подумать о том, что будут есть завтра, поэтому сейчас мы думаем об этом. Что делать с голодающими?"
 lif.90.a:0 "Это их проблемы."
 lif.90.b:0 "Немедленно купите все необходимое!"
 
 lif.91.t:0 "§WПротивостояние между классами"
 lif.91.desc:0 "Ремесленники стали замечать, насколько сильно торговцы стали повышать цены на материалы и по каким низким ценам они стали покупать продукцию. Они говорят, что если ситуация не изменится, им просто не на что будет жить. В свою очередь, торговцы считают, что все нормально и цена не может всегда оставаться неизменной. Ремесленники уже начали выпускать продукцию низкого качества в знак протеста. Мы должны вмешаться, пока конфликт между сословиями не перерос во что-то с ужасными последствиями."
 lif.91.a:0 "Я на стороне ремесленников!"
 lif.91.b:0 "Торговцы правы!"
 lif.91.c:0 "Я думаю, им просто нужно немного времени".
 lif.91.d:0 "Подкупайте торговцев, чтобы они пошли на уступки".
 
 lif.92.t:0 "§WРейды"
 lif.92.desc:0 "Ваше величество, при вашем правлении жизнь крестьян улучшилась, и они не стесняются говорить об этом между собой. Хвалебные оды льются рекой, и праздник не обходится без упоминания великого мастера."
 lif.92.a:0 "Счастливые люди - это признак стабильного будущего."
 
 lif.93.t:0 "§WРейды"
 lif.93.desc:0 "Сэр, беда! На наши территории регулярно совершались набеги со стороны соседнего государства. Мы слышали, что ситуация там не самая лучшая, и, возможно, набеги совершают голодающие люди. Если так пойдет и дальше, мы понесем убытки из-за проблем несчастного соседа."
 lif.93.a:0 "Разместите армию на границе!"
 lif.93.b:0 "Если нация не может удержать свою землю, почему бы ей не стать нашей?"
 lif.93.c:0 "Мы ничего не можем с этим поделать".
 
 lif.94.t:0 "§WМорская торговля"
 lif.94.desc:0 "Ваше величество! Как вы знаете, торговля очень важна для нашей страны. И если у нас есть выходы к морю, то их необходимо использовать. Как насчет строительства верфи? С ее помощью торговцы смогут строить свои собственные корабли."
 lif.94.a:0 "Хорошая идея."
 lif.94.b:0 "Сейчас мы не можем себе этого позволить..."
 
 lif.95.t:0 "§WСтроительство храма"
 lif.95.desc:0 "ММестное духовенство предлагает построить храм. Это будет добрым жестом, показывающим, что вы искренне преданы нашей религии. Более того, храм со временем окупит себя, потому что часть пожертвований поступает в казну в виде налогов."
 lif.95.a:0 "Нам нужен этот храм!"
 lif.95.b:0 "Зачем нам нужен этот храм?"
 
 lif.96.t:0 "§WУраган"
 lif.96.desc:0 "В одном из наших регионов ураган разрушил множество зданий. Много людей погибло и многие остались без крова."
 lif.96.a:0 "Мы не были готовы."

 lif.97.t:0 "§WПожары"
 lif.97.desc:0 "Многие города постоянно горят, и причина этого - деревянные дома. Можно понять фермеров, у которых просто не хватает денег на строительство прочных зданий, но это касается и центра города. Мы можем выделить деньги на то, чтобы большинство зданий было построено из камня."
 lif.97.a:0 "Сделаем это!"
 lif.97.b:0 "Это не моя проблема."
 
 lif.98.t:0 "§WКоррупция"
 lif.98.desc:0 "Последняя встреча элиты закончилась эффектным выступлением шута о том, что из казны начали исчезать деньги. Он дал вам кусочек льда и попросил передать его среди знати. Как только вы получили этот фрагмент обратно, от него почти ничего не осталось. Ваша реакция?"
 lif.98.a:0 "Ужесточить контроль над дворянами".
 lif.98.b:0 "Ввести новый налог для крестьян".
 lif.98.c:0 "Внести это в список "того, что следует игнорировать"."
 
 lif.99.t:0 "§WАрена"
 lif.99.desc:0 "Мир - это хорошо, но многие люди не могут жить без сражений. Мы можем построить арену в городе, чтобы горожане могли тренироваться и развлекаться."
 lif.99.a:0 "Время строить".
 lif.99.b:0 "Я тоже должен их развлекать?"
 
 lif.100.t:0 "§WУчения"
 lif.100.desc:0 "Мы можем провести масштабную подготовку наших солдат в столице на случай, если начнется война. Это потребует определенной суммы денег, но опыт солдат более ценен."
 lif.100.a:0 "Это того стоит".
 lif.100.b:0 "Битва станет для них тренировкой!"
 
 osm.1.t:0 "§WУчения"
 osm.1.desc:0 "Османский бейлик - довольно серьезный противник, и нам может понадобиться помощь. Мы можем попросить Арагона о помощи, и он, возможно, согласится."
 osm.1.a:0 "стоит попробовать".
 osm.1.b:0 "это плохая идея".
 
 osm.2.t:0 "§WЗапрос Византии"
 osm.2.desc:0 "Византия терпит поражение от поражения и просит нас о помощи в регионе с османским бейликом. Должны ли мы помочь?"
 osm.2.a:0 "Да, это укрепит дружбу."
 osm.2.b:0 "Кому они нужны!"
 
 osm.3.t:0 "§WАрагон отказался"
 osm.3.desc:0 "Арагон отказался помочь нам в войне."
 osm.3.a:0 "Несчастный."
 
 osm.4.t:0 "§WЭто уловка"
 osm.4.desc:0 "Византия беспомощна перед лицом угроз, даже Арагон может оказаться сильнее, и последний это прекрасно понимает. Мы можем попытаться привлечь Арагонцев на свою сторону, пообещав им долю добычи."
 osm.4.a:0 "Хорошая идея."
 osm.4.b:0 "Мы не дружим с нашими врагами."
 
 osm.5.t:0 "§WОсманская просьба"
 osm.5.desc:0 "Как все уже поняли, Византия ничего не стоит. Наш противник-османы тоже это понимает. Он предлагает перейти на их сторону, поскольку сражаться на стороне Византии не имеет смысла."
 osm.5.a:0 "Они правы."
 osm.5.b:0 "Византия - наш союзник."
 
 osm.6.t:0 "§WОсманская просьба"
 osm.6.desc:0 "Болгария и Византия находятся в состоянии войны уже много лет, и османы это понимают. Они предлагают заключить союз и захватить Византию вместе."
 osm.6.a:0 "Хорошая идея."
 osm.6.b:0 "Удар в спину? Честные люди так не поступают!"
 
 osm.7.t:0 "§WОтказ"
 osm.7.desc:0 "Болгария отказалась поддержать нас в войне."
 osm.7.a:0 "Это очень плохо."
 
 oth.10.t:0 "§WКанбу Великий"
 oth.10.desc:0 "Авантюрист, известный в наших кругах как Канбу Великий, собирается совершить великую кампанию. Он хочет объединить всю Африку под властью одной страны и привести империю к процветанию. У него уже есть большая поддержка, и он собрал огромную армию."
 oth.10.a:0 "К оружию!"
 oth.10.b:0 "Поддерживайте его идеи (играйте как)"
 
 lif.1147.t:0 "§WПронзительный клинок"
 lif.1147.desc:0 "Кузнец вернулся с испытания своего изобретения. Результаты настолько хороши, что весь двор в шоке."
 lif.1147.a:0 "Отлично!"
 
 lif.1247.t:0 "§WПодковы большого веса"
 lif.1247.desc:0 "Кузнец вернулся с испытания своего изобретения. Результаты настолько хороши, что весь двор в шоке."
 lif.1247.a:0 "Отлично!"
 
 lif.1347.t:0 "§WУлучшенные щиты"
 lif.1347.desc:0 "Кузнец вернулся с испытания своего изобретения. Результаты настолько хороши, что весь двор в шоке."
 lif.1347.a:0 "Отлично!"
 
 chh.1.t:0 "§WВолнения в народе!"
 chh.1.desc:0 "Из-за слишком резких изменений в политике нашего государства начались народные волнения. Сейчас Китай - республика. Однако многие влиятельные вассалы отказываются подчиняться и начинают создавать собственные империи. За власть в Китае на поле боя сойдутся 5 сторон. Корея, ваш вассал, почуяв слабость, вторглась на Север, а остров Тайвань, у которого свои республиканские взгляды, объявляет о создании Республики Тайвань. Время покажет, сможет ли выжить первая Китайская Республика."
 chh.1.a:0 "Слава Республике!"
 
 oth.7.t:0 "§WСлава Арагону!"
 oth.7.desc:0 "Мы выиграли гражданскую войну в Неаполе. Теперь те, кого поддержали, присягнули нам на верность. Этот день войдет в историю!"
 oth.7.a:0 "Слава Арагону!"
 
 oth.9.t:0 "§WСоюз с Литвой!"
 oth.9.desc:0 "Как мы уже убедились, вокруг нас много сильных противников, которые хотят завоевать нас в любой момент. С целью защиты от внешних сил Литва предлагает заключить союз."
 oth.9.a:0 "Мы согласны!"
 oth.9.b:0 "Этого не может быть!"
 
 oth.10.t:0 "§WНовгород согласен!"
 oth.10.desc:0 "Новгород согласился на союз с нами."
 oth.10.a:0 "Отлично!"
 
 oth.11.t:0 "§WНовгород отказывается!"
 oth.11.desc:0 "В Новгороде считают, что у нас совершенно разные пути развития и мы не можем быть в одном альянсе."
 oth.11.a:0 "Печально.."
 
 hre.50.t:0 "§WПризыв императора"
 hre.50.desc:0 "Над Священной Римской империей сгущается тьма. Сильное государство вторглось в страну. Император призывает всех объединиться и устранить угрозу со стороны внешних сил."
 hre.50.a:0 "Принять."
 hre.50.b:0 "Отклонить."
 
 chh.2.t:0 "§WПриглашение в альянс!"
 chh.2.desc:0 "Китайцы, видя постоянно растущую поддержку демократии в нашей стране, приглашают нас присоединиться к альянсу. Цель альянса - объединить республики для контроля над торговлей в регионе."
 chh.2.a:0 "Мы согласны."
 chh.2.b:0 "Нет!"
 
 chh.3.t:0 "§WПриглашение в альянс!"
 chh.3.desc:0 "Китайцы, видя постоянно растущую поддержку демократии в нашей стране, приглашают нас присоединиться к альянсу. Цель альянса - объединить республики для контроля над торговлей в регионе."
 chh.3.a:0 "Мы согласны."
 chh.3.b:0 "Нет!"
 
