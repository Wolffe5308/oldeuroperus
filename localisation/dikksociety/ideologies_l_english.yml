l_english:
  
  ### DEMOCRATIC ###
	traditional_lawism:0 "Traditional Lawism"
  traditional_lawism_desc:0 "Belief that governance should follow long-established traditions and unwritten laws rather than royal decrees"
	peasant_justice:0 "Peasant Justice"
  peasant_justice_desc:0 "Advocacy for fair treatment of commoners and the right to local self-rule in villages"
	guild_solidarism:0 "Guild Solidarism"
  guild_solidarism_desc:0 "The idea that economic and political power should be shared among workers' guilds and tradesmen"
	clerical_humanism:0 "Clerical Humanism"
  clerical_humanism_desc:0 "The belief that the church should promote justice, education, and limited governance rather than absolute monarchy"
	chivalric_republicanism:0 "Chivalric Republicanism"
  chivalric_republicanism_desc:0 "A philosophy that knights and nobles should uphold the rule of law and fairness, resisting tyranny"
	landholder_consensus:0 "Landholder Consensus"
  landholder_consensus_desc:0 " The belief that landowners, both noble and common, should have a say in governance, advocating for advisory councils and land-based rights"
	noble_liberalism:0 "Noble Liberalism"
  noble_liberalism_desc:0 "A view that nobility should act as defenders of liberties, balancing monarchy with the rights of their subjects"
	moral_contractualism:0 "Moral Contractualism"
  moral_contractualism_desc:0 "The idea that rulers and subjects are bound by moral contracts, where a just ruler must be followed, but a tyrant can be resisted"

  ### COMMUNISM ###
	decentralized_tribalism:0 "Decentralized Tribalism"
  decentralized_tribalism_desc:0 "Independent but cooperative tribes share resources and governance without a central ruler. Each group maintains autonomy but engages in mutual aid and trade."
	nomadic_collectivism:0 "Nomadic Collectivism"	
  nomadic_collectivism_desc:0 "A society where all resources and goods are shared among a constantly moving group, ensuring survival through collective ownership. Leadership is informal, based on consensus rather than hierarchy."			
	tribal_egalitarianism:0 "Tribal Egalitarianism"	
  tribal_egalitarianism_desc:0 "A decentralized system where all members of a tribe have equal say, with no permanent rulers, and wealth is distributed equally. Social status is based on contribution rather than birthright."
	mobile_syndicalism:0 "Mobile Syndicalism"	
  mobile_syndicalism_desc:0 "Workers’ unions or guilds collectively control resources and decision-making, even in a nomadic setting. Labor is organized through cooperative agreements rather than central authority."						
	anarcho_nomadism:0 "Anarcho Nomadism"
  anarcho_nomadism_desc:0 "A fully stateless, highly mobile society rejecting all forms of authority and structured governance. Laws and rules emerge from voluntary agreements rather than enforcement."

  ### FASCISM ###
	totalistic_sovereignty:0 "Totalistic Sovereignty"	
  totalistic_sovereignty_desc:0 "A system where an unchallenged ruler wields complete authority over the state, enforcing strict control, national unity, and an unwavering hierarchical order to maintain dominance."		
	theocratic_supremacy:0 "Theocratic Supremacy"
  theocratic_supremacy_desc:0 "Governance ruled by the clergy, with religious authority being the ultimate source of political power."		
	divine_rule:0 "Divine Rule"	
  divine_rule_desc:0 "The belief that the ruler’s power is granted by divine will and they are untouchable by mortal laws."	
	stratocratic_nationalism:0 "Stratocratic Nationalism"
  stratocratic_nationalism_desc:0 "A military-led society focused on national strength, with the state prioritizing military virtue and discipline."
	ultranationalism:0 "Ultranationalism"
  ultranationalism_desc:0 "Extreme loyalty to the nation, with emphasis on national identity and superiority, often leading to territorial expansion."
	imperialism:0 "Imperialism"
  imperialism_desc:0 "A desire to expand and conquer other lands in the name of the nation, seeking to create a vast empire under a single, powerful ruler."

  ### NEUTRALITY ###
	feudal_neutralism:0 "Feudal Neutralism"
	feudal_neutralism_desc:0 "A stance where a feudal society remains neutral, focusing on internal governance and avoiding involvement in foreign conflicts."
	agrarian_independence:0 "Agrarian Independence"
	agrarian_independence_desc:0 "A belief in self-sufficiency, where agricultural societies prioritize internal production and independence, avoiding foreign influence and conflicts."
	traditional_moderation:0 "Traditional Moderation"
	traditional_moderation_desc:0 "A philosophy that promotes balance and moderation in governance, seeking to avoid radical ideologies and external intervention."
	peaceful_isolationism:0 "Peaceful Isolationism"
	peaceful_isolationism_desc:0 "A policy of staying out of foreign affairs, focusing solely on internal peace, development, and avoiding international entanglements."
	neutral_mercantilism:0 "Neutral Mercantilism"
	neutral_mercantilism_desc:0 "A mercantile approach where a state maintains neutral trade relations with all nations, avoiding political or military conflicts while ensuring economic prosperity."
	monarchical_oligarchy:0 "Monarchical Oligarchy"
	monarchical_oligarchy_desc:0 "A system where power is held by a monarch alongside an elite ruling group, focusing on internal control and balance while avoiding foreign conflicts."
