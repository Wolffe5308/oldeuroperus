l_russian:
 LOADING_TIP_0:0 "Лучшей поддержкой для нас будет подписка на группу ВК"
 LOADING_TIP_1:0 "Если в регионе вымерло всё население, регион перестает пренадлежать государству и становится необитаемым. Это может стать хорошим шансом для соседей, ведь любой регион можно заселить, если вы с ним граничите."
 LOADING_TIP_2:0 "Не существует идеального государствоенного строя, каждый из 26 имеет свои достоинства и недостатки."
 LOADING_TIP_3:0 "Ацтекские ритуалы могут привести к неожиданным последствиям."
 LOADING_TIP_4:0 "Если вам нравится мод, поддержите нас на Patreon. Вы будете получать информацию о разработке раньше всех, различные тактики и советы, а также роль с привилегиями на нашем Discord сервере!"
 LOADING_TIP_5:0 "Не забывайте про взаимодействие с сословиями. В трудную минуту, это может стать спасением."
 LOADING_TIP_6:0 "Не забывайте следить за недовольством населения. В противном случае, это может стать для вас летальным."
 LOADING_TIP_7:0 "Будьте очень аккуратны, заключая династический брак. В будущем, при отсутствии наследников и смерти текущего правителя, есть шанс что вашу страну унаследуют."
 LOADING_TIP_8:0 "Колониальные автономии образуются только тогда, когда вы имеете все земли необходимые для создания автономии. Всего в мире можно сделать 32 колониальные автономии."
 LOADING_TIP_9:0 "Торговые компании могут быть очень выгодными."
 LOADING_TIP_10:0 "Болезни не только могут ударить по вашей экономике и армии, но и убить много людей в ваших провинциях."
 LOADING_TIP_11:0 "«Ежели-де государь, прибежище мира, укрепит ислам своей верой в него, то плохого не будет».\n- эмир Ноуруз"
 LOADING_TIP_12:0 "Вы всегда можете положить часть своих денег в банк под процент. Если сумма большая, это может стать выгодным вложением."
 LOADING_TIP_13:0 "Лучшая защита - это нападение!"
 LOADING_TIP_14:0 "«Ненависть - удел побежденных».\n- Конфуций"
 LOADING_TIP_15:0 "«Очень опасно встретить женщину, которая полностью тебя понимает. Это обычно кончается женитьбой».\n- Оскар Уайльд"
 LOADING_TIP_16:0 "«Мы должны признать очевидное: понимают лишь те, кто хочет понять».\n- Бернар Вербер"
 LOADING_TIP_17:0 "«Гений состоит в умении отличать тружное от невозможного».\n- Напалеон Бонапарт"
 LOADING_TIP_18:0 "«Если шарик лопнул, его уже не надуешь. Вернее надуешь, но другой».\n- Виталий Кличко"
 LOADING_TIP_19:0 "Также, автор мода разрабатывает свою собственную игру - глобальную стратегию Kingdom's Life. Более подробную информацию вы можете найти в социальных сетях и на Patreon."
 LOADING_TIP_20:0 "«А сегодня в завтрашний день не все могут смотреть. Вернее, смотреть могут не только лишь все. Мало, кто может это делать».\n- Виталий Кличко"
 LOADING_TIP_21:0 "«Один в поле не двое».\n- Виталий Кличко"
 LOADING_TIP_22:0 "«Чем больше женщину мы любим - тем больше меньше мы чем тем».\n- Виталий Кличко"
 LOADING_TIP_23:0 "«Я должен признаться. Уже долгое время, много-много лет, я являюсь убежденным лесбияном».\n- Виталий кличко"
 LOADING_TIP_24:0 "«О нас думают лишь те, кто хуже нас, а те кто лучше нас, им просто не до нас.»\n- Омар Хайям"
 LOADING_TIP_25:0 "«Счастье - это хорошее здоровье и плохая память».\n- Ингрид Бергман"
 LOADING_TIP_26:0 "«Удачливый человек - тот, кто способен сложить прочный фундамент из камней, которые швыряют в него другие».\n- Дейвид Бринкли"
 LOADING_TIP_27:0 "«Жизнь коротка, но слава может быть вечной».\n- Марк Туллий Цицерон"
 LOADING_TIP_28:0 "«Враги всегда говорят правду, друзья - никогда».\n- Марк Туллий Цицерон"
 LOADING_TIP_29:0 "«С добрыми и злыми нельзя вести себя одинаково».\n- Марк Туллий Цицерон"
 LOADING_TIP_30:0 "Минорное дерево фокусов не такое простое как кажется, в нем есть 2 фокуса на завоевание соседей. Поэтому в мире могут происходить различные непредсказуемые конфликты."
 LOADING_TIP_31:0 "«Постарайтесь получить то, что любите, иначе придется полюбить то, что получили».\n- Бернард Шоу Душа"
 LOADING_TIP_32:0 "«Если драгоценный камень попадает в грязь, он остается драгоценностью. Если пыль подымается к небу, она остается пылью.»\n- Муслихаддин Саади"
 LOADING_TIP_33:0 "Граничить с кочевниками опасно, они постоянно будут делать набеги."
 LOADING_TIP_34:0 "«Умные не столько ищут одиночесвта, сколько избегают создаваемой дураками суеты».\n- Артур Шопенгауэр"
 LOADING_TIP_35:0 "«Я не терпел поражений. Я просто нашел 10.000 способов, которые не работают»."
 LOADING_TIP_36:0 "«В конце концов, ты вспоминаешь не слова врагов, а молчание друзей».\n- Мартин Лютер Кинг"
 LOADING_TIP_37:0 "На состояние начала игры, в мире идет 7 войн."
 LOADING_TIP_38:0 "Долгая война никому не нравится. Чем больше вы воюете, тем больше поднимается военная усталость. Она дает свои небольшие дебаффы. А если военная усталость будет слишком высока, то начнет повышаться недовольство населения."
 LOADING_TIP_39:0 "«Высшая мудрость - различать добро и зло».\n- Сократ"
 LOADING_TIP_40:0 "«Нужно есть, чтобы жить, а не жить, чтобы есть».\n- Сократ"
 LOADING_TIP_41:0 "Максимальная централизация, медленно, но верно, будет ухудшать одношения дворян к вам."
 LOADING_TIP_42:0 "В один прекрасный день вы поймете, что народная медицина не работает."
 LOADING_TIP_43:0 "«Не важно сколько дней в твоей жизни, важно сколько жизни в твоих днях».\n- Идущий к реке"
 LOADING_TIP_44:0 "«Кто хочет - ищет способ, кто не хочет - ищет причину».\n- Сократ"
 LOADING_TIP_45:0 "«Когда человек не знает, к какой пристани он держит путь, для него ни один ветер не будет попутным».\n- Луций Анней Сенека"
 
