  ### CATEGORIES ###
  EQUIPMENT_ANTI_AIR:0 "Баллисты"
  EQUIPMENT_ARTILLERY:0 "Артиллерия"
  EQUIPMENT_ANTI_TANK:0 "Требюшет"
  EQUIPMENT_CONVOY:0 "Торговый конвой"

  ### EQUIPMENTS ###
  infantry_equipment:0 "Мечи"
  infantry_equipment_short:0 "Мечи"
  infantry_equipment_desc:0 "Универсальное оружие, используемое как в бою, так и как символ благородства. Его острый край и компактный дизайн делают его эффективным в ближнем бою."
  infantry_equipment_0:0 "Простой меч"
  infantry_equipment_0_short:0 "Простой меч"
  infantry_equipment_0_desc:0 "Простой меч, которым легко владеть, но который не так эффективен в бою, как более специализированные клинки. Идеально подходит для новичков в искусстве владения мечом."
  infantry_equipment_1:0 "Дуэльный меч"
  infantry_equipment_1_short:0 "Дуэльный меч"
  infantry_equipment_1_desc:0 "Прекрасно обработанный меч, предназначенный для боя один на один. Его баланс и острота делают его идеальным для дуэлей и личной защиты."
  infantry_equipment_2:0 "Меч-бастард"
  infantry_equipment_2_short:0 "Меч-бастард"
  infantry_equipment_2_desc:0 "Универсальное оружие, которым можно владеть как одной, так и двумя руками, обеспечивая сочетание досягаемости и мощи. Пользуется популярностью у рыцарей и наемников."
  infantry_equipment_3:0 "Фальшион"
  infantry_equipment_3_short:0 "Фальшион"
  infantry_equipment_3_desc:0 "Тяжелый однолезвийный меч с изогнутым лезвием, предназначенный для нанесения мощных рубящих ударов. Он эффективен как против бронированных, так и против небронированных противников.."

  support_equipment_short:0 "Оборудование."
  support_equipment:0 "Вспомогательное оборудование"
  support_equipment_desc:0 "Radios, Jeeps, Pontoons & other equipment used to support troops."
  support_equipment_1:0 "Вспомогательное оборудование"
  support_equipment_1_desc:0 "Radios, Jeeps, Pontoons & other equipment used to support troops."  

  archetype_motorized_equipment:0 "Повозка"
  motorized_equipment_1:0 "Лошадиная Повозка"
  motorized_equipment_1_short:0 "Повозка"
  motorized_equipment_1_desc:0 "Повозка, запряженная лошадью, значительно повышает мобильность товаров и оружия на дорогах."

  train_equipment_1:0 "Торговый караван"
  train_equipment_1_short:0 "Торговый караван"
  train_equipment_1_desc:0 "Группы караванов, перевозящих большое количество товаров, могут обеспечить достаточные запасы продовольствия и оружия"
  train_equipment_2:0 "Торговый караван II"
  train_equipment_2_short:0 "Торговый караван II"
  train_equipment_2_desc:0 "Группы караванов, перевозящих большое количество товаров, могут обеспечить достаточные запасы продовольствия и оружия"   
  
  gw_tank_equipment:0 "Легкие кавалерийские Полки"
  gw_tank_equipment_short:0 "Легкие кавалерийские Полки"
  gw_tank_equipment_desc:0 "Легкая кавалерия очень важна во многих армиях мира. Чаще всего ее используют для нанесения первого удара или захода в тыл."
  
  light_tank_equipment:0 "Броня копейщика"
  light_tank_equipment_desc:0 "Кавалерия, вооруженная копьями или пиками, является неотъемлемой частью армии. На большой скорости эти отважные воины врываются в ряды противника и открывают путь другим подразделениям"
  light_tank_equipment_1:0 "Броня копейщика I"
  light_tank_equipment_1_short:0 "Броня копейщика I"
  light_tank_equipment_1_desc:0 "Кавалерия, вооруженная копьями или пиками, является неотъемлемой частью армии. На большой скорости эти отважные воины врываются в ряды противника и открывают путь другим подразделениям"
  light_tank_equipment_2:0 "Броня копейщика II"
  light_tank_equipment_2_short:0 "Броня копейщика II"
  light_tank_equipment_2_desc:0 "Кавалерия, вооруженная копьями или пиками, является неотъемлемой частью армии. На большой скорости эти отважные воины врываются в ряды противника и открывают путь другим подразделениям"
  light_tank_equipment_3:0 "Броня копейщика III"
  light_tank_equipment_3_short:0 "Броня копейщика III"
  light_tank_equipment_3_desc:0 "Кавалерия, вооруженная копьями или пиками, является неотъемлемой частью армии. На большой скорости эти отважные воины врываются в ряды противника и открывают путь другим подразделениям"
  
  medium_tank_equipment:0 "Навесная защитная броня"
  medium_tank_equipment_desc:0 ""
  medium_tank_equipment_1:0 "Навесная защитная броня I"
  medium_tank_equipment_1_short:0 "Защитная броня I"
  medium_tank_equipment_1_desc:0 "Конные фехтовальщики использовались для выполнения различных задач. Они часто служили охраной командира, могли быть использованы для нанесения первого удара или даже надолго задержать противника."
  medium_tank_equipment_2:0 "Навесная защитная броня II"
  medium_tank_equipment_2_short:0 "Защитная броня II"
  medium_tank_equipment_2_desc:0 "Конные фехтовальщики использовались для выполнения различных задач. Они часто служили охраной командира, могли быть использованы для нанесения первого удара или даже надолго задержать противника." 
  medium_tank_equipment_3:0 "Навесная защитная броня III"
  medium_tank_equipment_3_short:0 "Защитная броня III"
  medium_tank_equipment_3_desc:0 "Конные фехтовальщики использовались для выполнения различных задач. Они часто служили охраной командира, могли быть использованы для нанесения первого удара или даже надолго задержать противника."
  
  heavy_tank_equipment:0 "Тяжелая кавалерийский Полк"
  heavy_tank_equipment_desc:0 ""
  heavy_tank_equipment_1:0 "Тяжелая кавалерийский Полк I"
  heavy_tank_equipment_1_short:0 "Тяжелая кавалерийская броня I"
  heavy_tank_equipment_1_desc:0 "Тяжелый кавалерист - один из самых ценных воинов на поле боя. Во всех регионах они были разными: в Европе - рыцари, в Азии - кешиктены, на Ближнем Востоке - мамлюки и т.д. Использовались для любых задач."  
  heavy_tank_equipment_2:0 "Тяжелая кавалерийский Полк II"
  heavy_tank_equipment_2_short:0 "Тяжелая кавалерийская броня II"
  heavy_tank_equipment_2_desc:0 "Тяжелый кавалерист - один из самых ценных воинов на поле боя. Во всех регионах они были разными: в Европе - рыцари, в Азии - кешиктены, на Ближнем Востоке - мамлюки и т.д. Использовались для любых задач."  
  heavy_tank_equipment_3:0 "Тяжелая кавалерийский Полк III"
  heavy_tank_equipment_3_short:0 "Тяжелая кавалерийская броня III"
  heavy_tank_equipment_3_desc:0 "Тяжелый кавалерист - один из самых ценных воинов на поле боя. Во всех регионах они были разными: в Европе - рыцари, в Азии - кешиктены, на Ближнем Востоке - мамлюки и т.д. Использовались для любых задач."

  anti_air_equipment:0 "Баллисты"
  anti_air_equipment_short:0 "Баллисты"
  anti_air_equipment_desc:0 "Баллисты - древнее чудо артиллерии. В основном используются против пехоты при атаке, а также для обороны крепостей."
  anti_air_equipment_1:0 "Баллисты I"
  anti_air_equipment_1_short:0 "Баллисты I"
  anti_air_equipment_1_desc:0 "Баллиста, мощная осадная машина древности, первоначально использовалась для метания больших болтов или камней во вражескую пехоту. Ее использование для защиты, особенно от воздушных угроз, знаменует собой эволюцию ее роли в военных действиях."
  anti_air_equipment_2:0 "Баллисты II"
  anti_air_equipment_2_desc:0 "Благодаря усовершенствованной механике и улучшенным прицельным приспособлениям баллисты теперь являются эффективным оружием для борьбы с воздушными угрозами, обеспечивая большую точность, чем раньше."
  anti_air_equipment_3:0 "Баллисты III"
  anti_air_equipment_3_desc:0 "Баллисты превратились в высокоэффективное оружие противовоздушной обороны с усовершенствованными механизмами перезарядки и более эффективными системами наведения для борьбы с вражескими воздушными подразделениями."
      
  anti_tank_equipment:0 "Требушет"
  anti_tank_equipment_short:0 "Требушет"
  anti_tank_equipment_desc:0 "Требушет полезен для отправки снарядов на большие расстояния, а также при осадах."
  anti_tank_equipment_1:0 "Требушет I"
  anti_tank_equipment_1_short:0 "Требушет I"
  anti_tank_equipment_1_desc:0 "Требушет, способный метать снаряды с высокой точностью и мощностью на большие расстояния. Его использование в осадных боях по-прежнему имеет большое значение для защиты бронированных укреплений."
  anti_tank_equipment_2:0 "Требушет II"
  anti_tank_equipment_2_desc:0 "Модернизированный требушет с усиленными механизмами для запуска более крупных и тяжелых снарядов, что делает его еще более эффективным против сильной обороны.."
  anti_tank_equipment_3:0 "Требушет III"
  anti_tank_equipment_3_desc:0 "Новейшая версия требушета с улучшенными системами прицеливания и увеличенной грузоподъемностью для максимального поражения вражеских укреплений и бронированных целей."

  artillery_equipment:0 "Катапульта"
  artillery_equipment_short:0 "Катапульта"
  artillery_equipment_desc:0 "Катапульта - главное артиллерийское орудие древности и средневековья."
  artillery_equipment_1:0 "Катапульта I"
  artillery_equipment_1_short:0 "Катапульта I"
  artillery_equipment_1_desc:0 "Катапульта, основное осадное орудие древнего и средневекового миров, способна метать тяжелые снаряды, пробивая стены или создавая хаос в рядах противника."
  artillery_equipment_2:0 "Катапульта II"
  artillery_equipment_2_desc:0 "Более усовершенствованная версия оригинальной катапульты, с улучшенной дальнобойностью и точностью стрельбы, что делает ее более эффективной при разрушении укреплений и рассеивании вражеских формирований.."
  artillery_equipment_3:0 "Катапульта III"
  artillery_equipment_3_desc:0 "Катапульта достигает своего пика с точки зрения мощности и эффективности, она способна запускать большие снаряды с огромной силой и точностью, чтобы уничтожить даже самую сильную оборону."
  
  bombarda_equipment_1:0 "Примитивная бомбарда"
  bombarda_equipment_1_desc:0 "Примитивная бомбарда, ранняя форма артиллерии, представляет собой большое, громоздкое орудие, используемое для метания тяжелых снарядов на большие расстояния. Несмотря на простоту конструкции, в руках опытных экипажей она служит мощным осадным орудием."
