l_russian:

 aus.1.t:0 "§WПредложение союза!"
 aus.1.desc:0 "Австрия предлагает нам союз. Вместе мы создадим сильный политический блок, который сможет противостоять нашим соседям".
 aus.1.a:0 "Мы согласны".
 aus.1.b:0 "Мы не присоединимся"

 aus.2.t:0 "Предложения о браке"
 aus.2.desc:0 "Ее Величество не замужем и должна исправить этот факт как можно скорее. Она любимица цивилизованного мира, и такое восхищение привлекло в Оттаву несколько потенциальных супругов. Брак с принцем из устоявшегося королевского дома, несомненно, придаст новый королевству Ее Величества значительный уровень легитимности".
 aus.2.a:0 "Принц Ричард Английский"
 aus.2.b:0 "Принц Леон Испанский"
 aus.2.c:0 "Принц Эрик Шведский"

 aus_news.1.a:0 "Вместе мы сильнее"
 aus_news.1.t:0 "§WЗапрос принят"
 aus_news.1.d:0 "Важным событием стало официальное принятие давно ожидаемого запроса на стратегическое партнерство, что ознаменовало новую эру сотрудничества между двумя сторонами. После месяцев переговоров обе стороны достигли взаимного соглашения, проложив путь для совместных инициатив, которые, как ожидается, принесут пользу нескольким секторам".

 aus_news.2.a:0 "У нас появились новые враги"
 aus_news.2.t:0 "§WЗапрос отклонен"
 aus_news.2.d:0 "Неожиданно долгожданный запрос на стратегическое партнерство был официально отклонен, в результате чего обе стороны оказались в застой. Источники, близкие к переговорам, сообщили, что, несмотря на месяцы обсуждений и ожиданий, ключевые условия не удалось согласовать, что в конечном итоге привело к решению отказаться от сделки."

 aus_news.3.a:0 "Начало торжеств"
 aus_news.3.t:0 "Королева Анна I фон Габсбург вышла замуж за принца Ричарда Английского"
 aus_news.3.d:0 "Королева Анна I фон Габсбург Австрийская вышла замуж за принца Ричарда Английского на торжественной церемонии во дворце Шёнбрунн в Вене. Союз этих двух выдающихся европейских королевских семей рассматривается как личный и дипломатический триумф, укрепляющий связи между Австрией и Соединенным Королевством".

 aus_news.4.a:0 "Начало торжеств"
 aus_news.4.t:0 "Королева Анна I фон Габсбург вышла замуж за принца Леона Испанского"
 aus_news.4.d:0 "Королева Анна I фон Габсбург Австрийская вышла замуж за принца Леона Испанского на великолепной церемонии, состоявшейся во дворце Шёнбрунн в Вене. Брак между Габсбургской и испанской королевскими семьями рассматривается как значимое событие в истории Европы, символизируя возобновленный союз между Австрией и Испанией."

 aus_news.5.a:0 "Начинаются торжества"
 aus_news.5.t:0 "Королева Анна I фон Габсбург вышла замуж за принца Эрика Шведского"
 aus_news.5.d:0 "Королева Анна I фон Габсбург Австрийская вышла замуж за принца Эрика Шведского на торжественной церемонии во дворце Шёнбрунн в Вене. Союз между этими двумя престижными королевскими семьями празднуется как важный союз, укрепляющий связи между Австрией и Швецией".