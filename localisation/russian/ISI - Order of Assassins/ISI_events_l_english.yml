l_english:

 hashashin.1.t:0 "Secret Invasion"
 hashashin.1.desc:0 "The imperious bandits running [FROM.GetNameDef] have demanded we immediately surrender the our territory over to them under threat of war. We cannot say that we are surprised by this decision by the [FROM.GetAdjective] vultures, but that does not make our situation any less precarious.\n\nWe must decide whether we are prepared to surrender our land to the [FROM.GetAdjective]s in the hopes of avoiding war or if we are willing to try to permanently cast [FROM.GetNameDef] back into the annals of history where they should have stayed."
 hashashin.1.a:0 "It is not worth the fight."
 hashashin.1.b:0 "It is well past time to dismantle the assassins permanently."

 hashashin.2.t:0 "[FROM.GetNameDefCap] Denies Us!"
 hashashin.2.desc:0 "The fools in [FROM.GetNameDef] have rejected our perfectly reasonable demand that our former territory be returned to its rightful owner. This leaves us with only one course of action: war!"
 hashashin.2.a:0 "Their impudence shall be met with our scimitars."
 
 hashashin.3.t:0 "Our Territories Are Ours!"
 hashashin.3.desc:0 "The weaklings of [FROM.GetNameDef] have demonstrated some uncharacteristic wisdom in their decision to return our Lands to us without necessitating violence."
 hashashin.3.a:0 "Welcome back to the Empire!" 

 hashashin.4.t:0 "Our Overlord Denies Us"
 hashashin.4.desc:0 "Our Overlord have demonstrated some uncharacteristic wisdom in their decision to not return our Lands."
 hashashin.4.a:0 "Unacceptable" 

 hashashin.5.t:0 "Demand of Gilan"
 hashashin.5.desc:0 "Hashashis need more lands to increase their power and economy."
 hashashin.5.a:0 "Donate to our Ally" 
 hashashin.5.b:0 "No!" 
 
