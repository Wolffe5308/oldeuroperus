 hashashin.10.t:0 "§WOffer of Alliance!"
 hashashin.10.desc:0 "Austria offers us an alliance. Together, we will create a strong political bloc that can stand up to our neighbors."
 hashashin.10.a:0 "We agree."
 hashashin.10.b:0 "We won't join"

 hashashin_news.1.a:0 "We are stronger together"
 hashashin_news.1.t:0 "§WRequest Accepted"
 hashashin_news.1.d:0 "In a significant development, the long-pending request for a strategic partnership has been officially accepted, marking a new era of collaboration between the two parties. After months of negotiations, both sides reached a mutual agreement, paving the way for joint initiatives that are expected to benefit multiple sectors. "

 hashashin_news.2.a:0 "We have new enemies"
 hashashin_news.2.t:0 "§WRequest Rejected"
 hashashin_news.2.d:0 "In a surprising move, the long-awaited request for a strategic partnership has been officially rejected, leaving both parties at a standstill. Sources close to the negotiations revealed that despite months of discussions and anticipation, key terms could not be agreed upon, ultimately leading to the decision to walk away from the deal."
