l_russian:

 bog.1.t:0 "§WВацлав II предлагает союз"
 bog.1.desc:0 "Сегодня в нашу столицу прибыли посланцы из Чехии. Они прибыли с предложением к Сербскому королевству вступить в союз с Чехией. В ближайшем будущем они планируют нападение на Венгрию. Чехи верят, что это станет для нас хорошим шансом вернуть себе наши национальные территории".
 bog.1.a:0 "Мы согласны."
 bog.1.b:0 "Это не в наших интересах."
 bog.2.t:0 "§WВацлав II предлагает союз"
 bog.2.desc:0 "Сегодня в нашу столицу прибыли посланцы из Богемии. Они прибыли с предложением к Валашскому королевству вступить в союз с Богемией. В ближайшем будущем они планируют нападение на Венгрию. Вацлав II считает, что это будет хорошим шансом для нас расширить наше королевство".
 bog.2.a:0 "Мы согласны."
 bog.2.b:0 "Это не в наших интересах."
 bog.3.t:0 "§WВосстание"
 bog.3.desc:0 "На западе нашей страны бушует восстание! Люди, населяющие эту территорию, хотят независимости. Они уже собрали небольшую армию ополченцев."
 bog.3.a:0 "Проклятые предатели!"
 
 bog.5.t:0 "§WПотеря титула!"
 bog.5.desc:0 "Король Богемии понял, что существование нескольких крупных титулов может вызвать проблемы в будущем. Поэтому он решил отменить наш титул! Для нас это означает потерю власти!"
 bog.5.a:0 "Да будет так..."
 bog.5.b:0 "Давайте покажем ему, кто здесь главный!"
