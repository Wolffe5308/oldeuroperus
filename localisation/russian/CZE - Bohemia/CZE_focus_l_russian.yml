 CZE_67_desc:0 "Формально мы владеем титулом короля Богемии и Польши в том числе. Чтобы этот титул вместе с иными землями не перешел под чужой контроль, можно уничтожить титул Польши и присоединить земли к Богемской короне."
 CZE_68_desc:0 "Формально мы владеем титулом короля Богемии и герцога Силезии. Чтобы этот титул вместе с иными землями не перешел под чужой контроль, можно уничтожить титул Силезии и присоединить земли к Богемской короне."
