l_russian:

 rrr.1.t:0 "Великая хартия вольностей"
 rrr.1.desc:0 "В парламенте представители графов и баронов потребовали от короля утвердить Великую хартию вольностей и дополнить ее новыми статьями на основании петиции, ранее поданной королю. После консультаций со своими советниками король Эдуард I подтвердил Великую и Лесную хартии и утвердил новые статьи Великой хартии."
 rrr.1.a:0 "Пусть ты подавишься этим."
 
 rrr.2.t:0 "Английская месть"
 rrr.2.desc:0 "Мы были вынуждены подписать этот позорный Парижский мирный договор в 1259 году. Где это видано, чтобы наш король был вассалом этих жалких французов? Пора положить этому конец. Либо они выполнят наши условия, либо мы заставим их сделать это кровью."
 rrr.2.a:0 "Что они скажут?"
 
 rrr.3.t:0 "Требования Эдварда"
 rrr.3.desc:0 "Английский король требует, чтобы мы передали все северо-западное побережье английской короне. Это очень дерзкое требование не может остаться без ответа. Что нам делать?"
 rrr.3.a:0 "Мы не в состоянии противостоять им..."
 rrr.3.b:0 "Поцелуй меня в з@дницу!"
 
 rrr.4.t:0 "Французский ответ"
 rrr.4.desc:0 ""Поцелуй меня в зад!" Таков ответ французов, что ж, пришло время показать им твое жалкое место в этом мире.."
 rrr.4.a:0 "Голова Филиппа будет отлично смотреться на козырьке."
 
 rrr.5.t:0 "Разврат и лицемерие"
 rrr.5.desc:0 "Каждый год папе Римскому поступает в 5 раз больше золота, чем за то же время получает король Эдуард. Святой Престол погряз в разврате и вымогательстве. В этом не осталось ничего святого, я думаю, сам Бог поможет нам в его отмене."
 rrr.5.a:0 "В интересах короны и парламента"
 
 rrr.6.t:0 "Король говорит!"
 rrr.6.desc:0 "Наш король Эдуард созвал сегодня срочное заседание парламента. После минутной паузы он, наконец, изложил весь свой план по развалу НИИ и попросил выделить бюджет. Обсуждение продолжалось 5 часов и закончилось бурными аплодисментами. После унижения Франции HRE осталась последним серьезным соперником в Европе."
 rrr.6.a:0 "Какой Я замечательный"

 rrr.7.t:0 "Возвращение британских территорий"
 rrr.7.desc:0 "Властные бандиты, бегущие [FROM.GetNameDef], потребовали, чтобы мы немедленно передали им нашу территорию под угрозой войны. Мы не можем сказать, что удивлены таким решением стервятников [FROM.GetAdjective], но это не делает наше положение менее опасным.Мы должны решить, готовы ли мы отдать нашу землю [FROM.GetAdjective] в надежде избежать войны, или мы готовы попытаться навсегда отбросить [FROM.GetNameDef] обратно в анналы истории, где они должны были остаться".
 rrr.7.a:0 "Это не стоит того, чтобы бороться."
 rrr.7.b:0 "Давно пора окончательно покончить с английской гегемонией."

 rrr.8.t:0 "[FROM.GetNameDefCap] Отвергает Нас!"
 rrr.8.desc:0 "Глупцы из [FROM.GetNameDef] отвергли наше совершенно разумное требование вернуть нашу бывшую территорию ее законному владельцу. Это оставляет нам только один выход: война!"
 rrr.8.a:0 "На их наглость мы ответим нашими ятаганами.
 
 rrr.9.t:0 "Наши Территории Принадлежат Нам!"
 rrr.9.desc:0 "Слабаки из [FROM.GetNameDef] продемонстрировали нехарактерную мудрость в своем решении вернуть нам наши земли без применения насилия".
 rrr.9.a:0 "Добро пожаловать обратно в Империю!"

 